
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego APA 7 · Citación y Referenciación</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4ff;padding:12px;font-family:'Nunito',sans-serif;}
#app{max-width:620px;margin:0 auto;border-radius:20px;overflow:hidden;background:#f0f4ff;}
.hdr{background:#1e40af;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;line-height:1.2;}
.hdr-score{background:rgba(255,255,255,0.2);color:#fff;font-weight:800;font-size:15px;padding:5px 14px;border-radius:999px;white-space:nowrap;}
#game-wrap{padding:16px;}

/* ── PANTALLA NOMBRE ── */
.name-screen{background:#fff;border-radius:16px;border:1.5px solid #bfdbfe;padding:22px;text-align:center;}
.name-title{font-family:'Fredoka One',cursive;font-size:21px;color:#1e40af;margin-bottom:6px;}
.name-sub{font-size:13px;color:#64748b;margin-bottom:16px;line-height:1.6;}
.name-input{width:100%;padding:11px 14px;border-radius:10px;border:2px solid #93c5fd;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;outline:none;color:#1e3a8a;margin-bottom:12px;}
.name-input:focus{border-color:#1e40af;}
.start-btn{width:100%;background:#1e40af;color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;box-shadow:0 4px 0 #1e3a8a;transition:transform .1s;}
.start-btn:hover{transform:translateY(-2px);}

/* ── MODOS ── */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
.mode-card{background:#fff;border:2.5px solid #bfdbfe;border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.mode-card:hover{border-color:#1e40af;transform:translateY(-2px);background:#eff6ff;}
.mode-icon{font-size:28px;margin-bottom:6px;}
.mode-name{font-family:'Fredoka One',cursive;font-size:14px;color:#1e40af;}
.mode-desc{font-size:11px;color:#64748b;margin-top:3px;line-height:1.4;}

/* ── HEADER DE RONDA ── */
.round-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.round-lbl{font-size:12px;font-weight:700;color:#64748b;}
.round-score{font-family:'Fredoka One',cursive;font-size:15px;color:#1e40af;}
.prog-bar{background:#dbeafe;border-radius:999px;height:7px;margin-bottom:14px;overflow:hidden;}
.prog-fill{height:100%;border-radius:999px;background:#1e40af;transition:width .4s;}
.mascot{display:flex;justify-content:center;margin-bottom:8px;}

/* ── BADGE TEMA ── */
.tema-badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 11px;border-radius:999px;margin-bottom:8px;letter-spacing:.4px;}
.t-libro    {background:#dbeafe;color:#1e3a8a;}
.t-revista  {background:#ede9fe;color:#4c1d95;}
.t-web      {background:#dcfce7;color:#14532d;}
.t-red      {background:#fce7f3;color:#9d174d;}
.t-video    {background:#fef3c7;color:#78350f;}
.t-periodico{background:#fee2e2;color:#7f1d1d;}
.t-ia       {background:#f0fdf4;color:#15803d;}
.t-citacion {background:#fff7ed;color:#7c2d12;}
.t-especial {background:#f5f3ff;color:#5b21b6;}
.t-elementos{background:#ecfeff;color:#0e7490;}

/* ── CAJA PREGUNTA ── */
.q-box{background:#fff;border-radius:14px;border:2px solid #bfdbfe;padding:14px;margin-bottom:12px;}
.q-lbl{font-size:11px;font-weight:700;color:#1e40af;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;text-align:center;}
.q-text{font-size:13px;font-weight:700;color:#1e3a8a;line-height:1.6;margin-bottom:4px;}
.ref-bloque{font-family:monospace;font-size:12px;background:#f8fafc;border-radius:8px;padding:10px;border:1px solid #e2e8f0;line-height:1.9;margin-top:6px;color:#1e293b;}
.ref-bloque em{font-style:italic;}
.ref-bloque u{text-decoration:underline;}

/* ── OPCIONES MÚLTIPLE ── */
.opts-col{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.opt-btn{padding:10px 14px;border-radius:11px;border:2.5px solid #bfdbfe;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#1e3a8a;text-align:left;transition:all .15s;line-height:1.4;}
.opt-btn:hover:not(:disabled){transform:translateY(-2px);border-color:#1e40af;background:#eff6ff;}
.opt-btn:disabled{cursor:not-allowed;opacity:.75;}
.opt-btn.correct{background:#22c55e!important;border-color:#16a34a!important;color:#fff!important;}
.opt-btn.wrong  {background:#ef4444!important;border-color:#dc2626!important;color:#fff!important;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ── ORDENAR (drag-like con botones flecha) ── */
.orden-lista{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.orden-item{background:#fff;border:2.5px solid #93c5fd;border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#1e3a8a;font-family:monospace;}
.orden-item.locked{border-color:#22c55e;background:#f0fdf4;color:#15803d;}
.orden-num{font-family:'Fredoka One',cursive;font-size:16px;color:#93c5fd;min-width:20px;}
.orden-flechas{display:flex;flex-direction:column;gap:2px;margin-left:auto;}
.flecha{background:#dbeafe;border:none;border-radius:6px;width:26px;height:22px;cursor:pointer;font-size:13px;color:#1e40af;font-weight:800;transition:background .1s;}
.flecha:hover{background:#bfdbfe;}
.check-orden-btn{width:100%;background:#1e40af;color:#fff;border:none;border-radius:11px;padding:10px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;box-shadow:0 3px 0 #1e3a8a;margin-bottom:10px;transition:transform .1s;}
.check-orden-btn:hover{transform:translateY(-1px);}

/* ── CLASIFICAR (drag-like con click) ── */
.clasif-tokens{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;padding:10px;background:#f8fafc;border-radius:11px;border:1.5px dashed #93c5fd;min-height:48px;}
.token{padding:6px 12px;background:#dbeafe;border:2px solid #93c5fd;border-radius:999px;font-size:12px;font-weight:700;color:#1e3a8a;cursor:pointer;transition:all .15s;font-family:monospace;}
.token:hover{background:#bfdbfe;transform:scale(1.05);}
.token.used{opacity:.35;cursor:default;pointer-events:none;}
.clasif-zonas{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.zona{background:#fff;border:2.5px dashed #93c5fd;border-radius:12px;padding:10px;min-height:80px;}
.zona-title{font-family:'Fredoka One',cursive;font-size:13px;color:#1e40af;margin-bottom:6px;text-align:center;}
.zona-items{display:flex;flex-direction:column;gap:5px;}
.zona-chip{background:#eff6ff;border:1.5px solid #93c5fd;border-radius:8px;padding:5px 8px;font-size:11px;font-weight:700;color:#1e3a8a;display:flex;justify-content:space-between;align-items:center;font-family:monospace;}
.zona-chip button{background:none;border:none;cursor:pointer;color:#ef4444;font-size:13px;font-weight:800;padding:0 2px;}
.zona-chip.c-ok{border-color:#22c55e;background:#f0fdf4;color:#15803d;}
.zona-chip.c-err{border-color:#ef4444;background:#fef2f2;color:#dc2626;}
.check-clasif-btn{width:100%;background:#1e40af;color:#fff;border:none;border-radius:11px;padding:10px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;box-shadow:0 3px 0 #1e3a8a;margin-bottom:10px;transition:transform .1s;}
.check-clasif-btn:hover{transform:translateY(-1px);}

/* ── FEEDBACK / EXPLICACIÓN ── */
.exp-box{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:10px 12px;font-size:12px;color:#1e40af;margin-bottom:8px;line-height:1.6;display:none;}
.exp-box.show{display:block;}
.feedback{text-align:center;font-family:'Fredoka One',cursive;font-size:17px;min-height:22px;margin-bottom:3px;}
.fb-ok{color:#16a34a;}.fb-err{color:#dc2626;}
.delta{font-size:20px;font-weight:800;text-align:center;min-height:26px;margin-bottom:6px;}
.delta.up{color:#16a34a;}.delta.down{color:#dc2626;}

/* ── RESULTADO ── */
.result{text-align:center;padding:16px 8px;}
.res-title{font-family:'Fredoka One',cursive;font-size:26px;color:#1e40af;margin-bottom:4px;}
.res-stars{font-size:34px;margin:8px 0;}
.res-card{background:#fff;border-radius:14px;border:1.5px solid #bfdbfe;padding:14px;margin:12px 0;text-align:left;}
.res-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid #dbeafe;font-size:14px;}
.res-row:last-child{border:none;font-weight:800;font-size:15px;color:#1e40af;}
.res-lbl{color:#64748b;font-weight:600;}
.res-val{font-weight:700;color:#1e3a8a;}
.rbtn{background:#1e40af;color:#fff;border:none;border-radius:12px;padding:10px 22px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;box-shadow:0 3px 0 #1e3a8a;margin:4px;transition:transform .1s;}
.rbtn:hover{transform:translateY(-2px);}
.rbtn.sec{background:#dbeafe;color:#1e40af;box-shadow:0 3px 0 #93c5fd;}
</style>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">APA 7 · Citación &amp; Referencias</div>
    <div class="hdr-score" id="hdr-score">0 pts</div>
  </div>
  <div id="game-wrap"></div>
</div>

<script>
/* ══════════════════════════════════════════
   MASCOTAS SVG
══════════════════════════════════════════ */
const M_IDL=`<svg width="64" height="64" viewBox="0 0 70 70"><circle cx="35" cy="35" r="32" fill="#dbeafe" stroke="#1e40af" stroke-width="2.5"/><circle cx="24" cy="30" r="4" fill="#1e40af"/><circle cx="46" cy="30" r="4" fill="#1e40af"/><path d="M24 46 Q35 52 46 46" stroke="#1e40af" stroke-width="3" stroke-linecap="round" fill="none"/><circle cx="25" cy="30" r="1.5" fill="#fff"/><circle cx="47" cy="30" r="1.5" fill="#fff"/></svg>`;
const M_OK =`<svg width="64" height="64" viewBox="0 0 70 70"><circle cx="35" cy="35" r="32" fill="#bbf7d0" stroke="#22c55e" stroke-width="2.5"/><circle cx="24" cy="28" r="4" fill="#15803d"/><circle cx="46" cy="28" r="4" fill="#15803d"/><path d="M22 44 Q35 56 48 44" stroke="#15803d" stroke-width="3" stroke-linecap="round" fill="none"/><polyline points="14,35 22,43 40,25" stroke="#15803d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
const M_ERR=`<svg width="64" height="64" viewBox="0 0 70 70"><circle cx="35" cy="35" r="32" fill="#fecaca" stroke="#ef4444" stroke-width="2.5"/><circle cx="24" cy="28" r="4" fill="#dc2626"/><circle cx="46" cy="28" r="4" fill="#dc2626"/><path d="M22 50 Q35 40 48 50" stroke="#dc2626" stroke-width="3" stroke-linecap="round" fill="none"/><line x1="18" y1="18" x2="30" y2="30" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/><line x1="30" y1="18" x2="18" y2="30" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/></svg>`;
const M_WIN=`<svg width="64" height="64" viewBox="0 0 70 70"><circle cx="35" cy="35" r="32" fill="#fef08a" stroke="#eab308" stroke-width="2.5"/><circle cx="24" cy="28" r="4" fill="#92400e"/><circle cx="46" cy="28" r="4" fill="#92400e"/><path d="M20 44 Q35 60 50 44" stroke="#92400e" stroke-width="3.5" stroke-linecap="round" fill="none"/><path d="M10 15 L14 25 L24 22 L17 30 L22 40 L12 34 L8 44 L7 33 L-3 30 L7 24Z" transform="translate(44,2) scale(0.6)" fill="#eab308"/></svg>`;

/* ══════════════════════════════════════════
   BANCO DE PREGUNTAS
   tipo: 'M'=múltiple, 'O'=ordenar, 'C'=clasificar
══════════════════════════════════════════ */
const BANCO=[

/* ─── ELEMENTOS DE UNA REFERENCIA ─── */
{tipo:'M',tema:'t-elementos',temaLabel:'Elementos de referencia',
 q:'¿En qué orden correcto se escriben los elementos de una referencia APA 7?',
 opts:['Título, Autor, Año, Fuente',
       'Autor, Año, Título, Fuente',
       'Año, Autor, Fuente, Título',
       'Fuente, Título, Autor, Año'],
 a:1,exp:'En APA 7 el orden es siempre: Autor. (Año). Título. Fuente. Este orden aplica a todos los tipos de referencia.'},

{tipo:'M',tema:'t-elementos',temaLabel:'Elementos de referencia',
 q:'En la referencia: Gargallo, B., Morera, I. … y García, E. (2014). Metodología… Revista Española de Pedagogía. (259) pp.415-435\n¿Qué elemento es "Revista Española de Pedagogía"?',
 opts:['El autor','El año de publicación','El título del artículo','La fuente (revista)'],
 a:3,exp:'La fuente en una referencia de artículo de revista es el nombre de la revista, escrito en cursiva. Es el elemento 4 según la estructura APA 7.'},

{tipo:'M',tema:'t-elementos',temaLabel:'Elementos de referencia',
 q:'¿Cómo se escribe el título de un libro en la lista de referencias APA 7?',
 opts:['Entre comillas: "El título"',
       'En cursiva y solo la primera letra en mayúscula: El título del libro',
       'Todo en mayúsculas: EL TÍTULO DEL LIBRO',
       'Subrayado y entre comillas: "El título"'],
 a:1,exp:'En APA 7 el título del libro va en cursiva. Solo la primera palabra y los nombres propios llevan mayúscula inicial.'},

/* ─── REFERENCIA LIBRO ─── */
{tipo:'O',tema:'t-libro',temaLabel:'Referencia · Libro',
 instruccion:'Ordena los elementos para construir la referencia de un libro en APA 7:',
 items:['Apellido, N. (Autor)',
        '(Año).',
        'Título del libro en cursiva.',
        'Editorial.'],
 orden_correcto:[0,1,2,3],
 exp:'Libro APA 7: Apellido, N. (Año). Título en cursiva. Editorial.'},

{tipo:'M',tema:'t-libro',temaLabel:'Referencia · Libro',
 q:'¿Cuál es la referencia correcta de un libro en APA 7?',
 opts:['García, M. (2020). Aprendizaje activo. Universidad Nacional.',
       '"Aprendizaje activo" García, M. Universidad Nacional, 2020.',
       'García, M. Aprendizaje activo. 2020. Universidad Nacional.',
       'M. García (2020) — Aprendizaje activo — Universidad Nacional.'],
 a:0,exp:'Formato libro APA 7: Apellido, N. (Año). Título en cursiva. Editorial. Los elementos siempre van en ese orden y con esa puntuación.'},

/* ─── REFERENCIA REVISTA ─── */
{tipo:'O',tema:'t-revista',temaLabel:'Referencia · Revista',
 instruccion:'Ordena los elementos de la referencia de un artículo de revista:',
 items:['Apellido, N. (Autor)',
        '(Año).',
        'Título del artículo.',
        'Nombre de la Revista, volumen(número), páginas. DOI/URL'],
 orden_correcto:[0,1,2,3],
 exp:'Artículo de revista APA 7: Apellido, N. (Año). Título del artículo. Nombre de la Revista en cursiva, volumen(número), páginas. https://doi.org/...'},

{tipo:'M',tema:'t-revista',temaLabel:'Referencia · Revista',
 q:'En la referencia de un artículo de revista, ¿qué elemento va en cursiva?',
 opts:['El título del artículo',
       'El nombre de la revista y el número de volumen',
       'El apellido del autor',
       'El DOI o URL'],
 a:1,exp:'En APA 7, el nombre de la revista y el número de volumen van en cursiva. El título del artículo NO lleva cursiva (solo mayúscula inicial).'},

/* ─── REFERENCIA PERIÓDICO ─── */
{tipo:'M',tema:'t-periodico',temaLabel:'Referencia · Periódico',
 q:'¿Cuál es la diferencia en la fecha de una referencia de periódico respecto a un libro?',
 opts:['No hay diferencia, ambos usan solo el año.',
       'En periódico se incluye año, mes y día: (2024, 15 de marzo).',
       'En periódico solo se escribe el mes.',
       'En periódico se omite la fecha.'],
 a:1,exp:'Las referencias de periódico incluyen la fecha completa: (Año, día de mes). Ejemplo: (2024, 15 de marzo). Esto permite identificar exactamente qué edición se consultó.'},

{tipo:'M',tema:'t-periodico',temaLabel:'Referencia · Periódico',
 q:'¿Cuál es el formato correcto para referenciar un artículo de periódico en APA 7?',
 opts:['Autor. (Año, día de mes). Título del artículo. Nombre del Periódico. URL',
       'Autor. (Año). Título del artículo. Nombre del Periódico. Editorial.',
       'Nombre del Periódico. (Año). Título. Autor. URL',
       'Autor. Nombre del Periódico. (Año, día de mes). Título. URL'],
 a:0,exp:'Periódico APA 7: Autor. (Año, día de mes). Título del artículo. Nombre del Periódico en cursiva. URL. La fecha completa distingue este tipo de fuente.'},

/* ─── REFERENCIA WEB ─── */
{tipo:'M',tema:'t-web',temaLabel:'Referencia · Página web',
 q:'¿Cuál es el formato correcto para referenciar una página web en APA 7?',
 opts:['Autor. (Año, día de mes). Título de la página. Nombre del sitio web. URL',
       'URL. Autor. (Año). Título.',
       'Autor. Título. URL. (Año).',
       'Nombre del sitio. (Año). URL. Autor. Título.'],
 a:0,exp:'Web APA 7: Autor. (Año, día de mes). Título de la página en cursiva. Nombre del sitio web. https://... La fecha puede incluir mes y día cuando el contenido cambia con frecuencia.'},

{tipo:'M',tema:'t-web',temaLabel:'Referencia · Página web',
 q:'Cuando el autor de una página web es una organización (no una persona), ¿cómo se escribe?',
 opts:['Se omite el autor y se empieza por el título.',
       'Se escribe el nombre de la organización como autor: Organización. (Año).',
       'Se escribe "Anónimo" como autor.',
       'Se escribe el nombre del director de la organización.'],
 a:1,exp:'En APA 7, cuando el autor es una organización o institución, se escribe su nombre completo en el lugar del autor. Ejemplo: Ministerio de Educación. (2023).'},

/* ─── REFERENCIA RED SOCIAL ─── */
{tipo:'M',tema:'t-red',temaLabel:'Referencia · Red social',
 q:'¿Cómo se referencia una publicación de Instagram en APA 7?',
 opts:['Autor [@usuario]. (Año, día de mes). Contenido de la publicación [Fotografía/Video]. Instagram. URL',
       'Instagram. (Año). Autor. URL.',
       '@usuario. (Año). Publicación. Instagram.',
       'Autor. Año. Título. Instagram. URL.'],
 a:0,exp:'Redes sociales APA 7: Autor real [@usuario]. (Año, día mes). Primeras palabras del contenido [Tipo de publicación]. Nombre de la red. URL. El nombre de usuario entre corchetes ayuda a identificar la fuente.'},

{tipo:'M',tema:'t-red',temaLabel:'Referencia · Red social',
 q:'En una referencia de Twitter/X en APA 7, ¿qué se usa como "título" de la publicación?',
 opts:['El hashtag principal del tweet.',
       'Las primeras 20 palabras del tweet, entre corchetes.',
       'El título que asigna la plataforma.',
       'El tema general de la cuenta.'],
 a:1,exp:'En APA 7, para tweets y publicaciones cortas se usan las primeras 20 palabras del contenido como título, seguidas de la descripción del formato entre corchetes: [Tweet].'},

/* ─── REFERENCIA CANAL DE VIDEO ─── */
{tipo:'M',tema:'t-video',temaLabel:'Referencia · Canal de video',
 q:'¿Cuál es el formato para referenciar un video de YouTube en APA 7?',
 opts:['Autor [Canal]. (Año, día de mes). Título del video [Video]. YouTube. URL',
       'YouTube. (Año). Autor. Título. URL.',
       'Autor. Título. [Video YouTube]. Año. URL.',
       'Canal de YouTube. (Año). URL. Título del video.'],
 a:0,exp:'Video YouTube APA 7: Autor o nombre del canal [Canal]. (Año, día mes). Título del video en cursiva [Video]. YouTube. https://... El tipo de fuente va entre corchetes.'},

{tipo:'M',tema:'t-video',temaLabel:'Referencia · Canal de video',
 q:'Si el nombre del canal de YouTube es diferente al nombre real del creador, ¿cómo se escribe en APA 7?',
 opts:['Solo el nombre real del creador.',
       'Solo el nombre del canal.',
       'Nombre Real [NombreDelCanal]. (Año).',
       'Se omite el autor y se empieza por el título.'],
 a:2,exp:'Cuando el nombre real y el nombre del canal difieren, APA 7 recomienda: Nombre Real [NombreDelCanal]. Esto permite identificar tanto a la persona como al canal.'},

/* ─── REFERENCIA INTELIGENCIA ARTIFICIAL ─── */
{tipo:'M',tema:'t-ia',temaLabel:'Referencia · IA (ChatGPT)',
 q:'¿Cuál es el formato correcto para referenciar ChatGPT en APA 7?',
 opts:['ChatGPT. (2023). Respuesta a mi pregunta. OpenAI.',
       'OpenAI. (2023). ChatGPT (versión del 14 de marzo) [Modelo de lenguaje grande]. https://chat.openai.com',
       'OpenAI, 2023. ChatGPT. www.openai.com.',
       'ChatGPT [IA]. OpenAI. (2023). https://chat.openai.com'],
 a:1,exp:'IA APA 7: Empresa. (Año). Nombre del modelo (versión) [Tipo de modelo]. URL. El descriptor entre corchetes (Modelo de lenguaje grande) explica al lector qué tipo de fuente es.'},

{tipo:'M',tema:'t-ia',temaLabel:'Referencia · IA (ChatGPT)',
 q:'Según APA 7, ¿quién es el "autor" de ChatGPT en una referencia?',
 opts:['ChatGPT, porque es quien genera el texto.',
       'El estudiante que hizo la consulta.',
       'OpenAI, la empresa que creó el modelo.',

/* ══════════════════════════════════════════
   ESTADO GLOBAL
══════════════════════════════════════════ */
let playerName='', score=0, curQ=0, questions=[], answered=false;
let ordenState=[], clasificState={items:[],asignados:[]};

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function updHdr(){document.getElementById('hdr-score').textContent=score+' pts';}

/* ══════════════════════════════════════════
   PANTALLA NOMBRE
══════════════════════════════════════════ */
function showName(){
  document.getElementById('game-wrap').innerHTML=`
    <div class="name-screen">
      <div style="display:flex;justify-content:center;margin-bottom:14px">${M_IDL}</div>
      <div class="name-title">¡Bienvenido!</div>
      <div class="name-sub">Juega y practica la citación y referenciación en<br><b style="color:#1e40af">Normas APA 7ª edición</b>.<br><br>
        <b style="color:#16a34a">Acierto: +100 pts</b> &nbsp;|&nbsp; <b style="color:#dc2626">Error: -10 pts</b>
      </div>
      <input class="name-input" id="name-inp" type="text" placeholder="Tu nombre completo..." maxlength="60">
      <button class="start-btn" onclick="startGame()">¡Comenzar!</button>
    </div>`;
  setTimeout(()=>{const i=document.getElementById('name-inp');if(i)i.focus();},100);
}

function startGame(){
  const inp=document.getElementById('name-inp');
  const n=inp?inp.value.trim():'';
  if(!n){inp.style.borderColor='#ef4444';inp.placeholder='¡Escribe tu nombre primero!';return;}
  playerName=n; score=0; curQ=0; answered=false;
  questions=shuffle(BANCO).slice(0,16);
  updHdr(); renderQ();
}

/* ══════════════════════════════════════════
   RENDER PREGUNTA
══════════════════════════════════════════ */
function renderQ(){
  if(curQ>=questions.length){showResult();return;}
  const q=questions[curQ];
  const pct=Math.round((curQ/questions.length)*100);
  answered=false;

  const hdr=`
    <div class="round-hdr">
      <div class="round-lbl">Pregunta ${curQ+1} / ${questions.length}</div>
      <div class="round-score">${score} pts</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="mascot" id="mc">${M_IDL}</div>`;

  if(q.tipo==='M') renderMultiple(q,hdr);
  else if(q.tipo==='O') renderOrden(q,hdr);
  else if(q.tipo==='C') renderClasif(q,hdr);
}

/* ── MÚLTIPLE ── */
function renderMultiple(q,hdr){
  const badge=`<span class="tema-badge ${q.tema}">${q.temaLabel}</span>`;
  const optsHtml=q.opts.map((o,i)=>
    `<button class="opt-btn" onclick="checkM(${i},this)">${o}</button>`
  ).join('');
  document.getElementById('game-wrap').innerHTML=hdr+`
    <div class="q-box">
      <div>${badge}</div>
      <div class="q-lbl">Selecciona la respuesta correcta</div>
      <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="opts-col">${optsHtml}</div>
    <div class="exp-box" id="exp"></div>
    <div class="delta" id="delta"></div>
    <div class="feedback" id="fb"></div>`;
}

function checkM(idx,btn){
  if(answered)return; answered=true;
  const q=questions[curQ];
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  showExp(q.exp);
  if(idx===q.a){
    btn.classList.add('correct'); score+=100; updHdr();
    setFb(true,'+100 puntos'); document.getElementById('mc').innerHTML=M_OK;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn')[q.a].classList.add('correct');
    score=Math.max(0,score-10); updHdr();
    setFb(false,'-10 puntos'); document.getElementById('mc').innerHTML=M_ERR;
  }
  setTimeout(()=>{curQ++;renderQ();},2400);
}

/* ── ORDENAR ── */
function renderOrden(q,hdr){
  const badge=`<span class="tema-badge ${q.tema}">${q.temaLabel}</span>`;
  // estado inicial: items en orden aleatorio
  ordenState=shuffle(q.items.map((_,i)=>i)); // índices mezclados
  document.getElementById('game-wrap').innerHTML=hdr+`
    <div class="q-box">
      <div>${badge}</div>
      <div class="q-lbl">Ordena los elementos</div>
      <div class="q-text">${q.instruccion}</div>
    </div>
    <div class="orden-lista" id="ol"></div>
    <button class="check-orden-btn" onclick="checkOrden()">Verificar orden ✓</button>
    <div class="exp-box" id="exp"></div>
    <div class="delta" id="delta"></div>
    <div class="feedback" id="fb"></div>`;
  renderOrdenLista(q);
}

function renderOrdenLista(q){
  const ol=document.getElementById('ol');
  if(!ol)return;
  ol.innerHTML=ordenState.map((itemIdx,pos)=>`
    <div class="orden-item" id="oi-${pos}">
      <span class="orden-num">${pos+1}.</span>
      <span style="flex:1;font-size:12px">${q.items[itemIdx]}</span>
      <div class="orden-flechas">
        ${pos>0?`<button class="flecha" onclick="moverOrden(${pos},-1)">▲</button>`:'<div style="height:22px"></div>'}
        ${pos<ordenState.length-1?`<button class="flecha" onclick="moverOrden(${pos},1)">▼</button>`:'<div style="height:22px"></div>'}
      </div>
    </div>`).join('');
}

function moverOrden(pos,dir){
  const q=questions[curQ];
  const tmp=ordenState[pos]; ordenState[pos]=ordenState[pos+dir]; ordenState[pos+dir]=tmp;
  renderOrdenLista(q);
}

function checkOrden(){
  if(answered)return; answered=true;
  const q=questions[curQ];
  const correcto=q.orden_correcto.every((v,i)=>ordenState[i]===v);
  document.querySelectorAll('.flecha').forEach(b=>b.disabled=true);
  document.querySelector('.check-orden-btn').disabled=true;
  showExp(q.exp);
  // colorear
  ordenState.forEach((itemIdx,pos)=>{
    const el=document.getElementById('oi-'+pos);
    if(el) el.classList.add('locked');
  });
  if(correcto){
    score+=100; updHdr();
    setFb(true,'+100 puntos'); document.getElementById('mc').innerHTML=M_OK;
  } else {
    score=Math.max(0,score-10); updHdr();
    setFb(false,'El orden correcto es: '+q.items.join(' → '));
    document.getElementById('mc').innerHTML=M_ERR;
  }
  setTimeout(()=>{curQ++;renderQ();},3000);
}

/* ── CLASIFICAR ── */
function renderClasif(q,hdr){
  const badge=`<span class="tema-badge ${q.tema}">${q.temaLabel}</span>`;
  clasificState={items:shuffle(q.items.map((it,i)=>({...it,id:i}))),asignados:q.zonas.map(()=>[])};
  document.getElementById('game-wrap').innerHTML=hdr+`
    <div class="q-box">
      <div>${badge}</div>
      <div class="q-lbl">Arrastra / selecciona y clasifica</div>
      <div class="q-text">${q.instruccion}</div>
    </div>
    <div class="clasif-tokens" id="tokens"></div>
    <div class="clasif-zonas" id="zonas"></div>
    <button class="check-clasif-btn" onclick="checkClasif()">Verificar ✓</button>
    <div class="exp-box" id="exp"></div>
    <div class="delta" id="delta"></div>
    <div class="feedback" id="fb"></div>`;
  renderClasifUI(q);
}

let selectedToken=null;

function renderClasifUI(q){
  // tokens disponibles
  const tk=document.getElementById('tokens');
  if(!tk)return;
  const usedIds=clasificState.asignados.flat().map(x=>x.id);
  tk.innerHTML=clasificState.items.map(it=>`
    <div class="token${usedIds.includes(it.id)?' used':''}" 
         id="tok-${it.id}"
         onclick="selectToken(${it.id})">${it.texto}</div>`).join('');
  // zonas
  const zn=document.getElementById('zonas');
  if(!zn)return;
  zn.innerHTML=q.zonas.map((zname,zi)=>`
    <div class="zona" onclick="dropToZona(${zi})">
      <div class="zona-title">${zname}</div>
      <div class="zona-items" id="zona-${zi}">
        ${clasificState.asignados[zi].map(it=>`
          <div class="zona-chip" id="chip-${it.id}">
            <span style="font-size:11px">${it.texto}</span>
            <button onclick="quitarDeZona(${zi},${it.id},event)">✕</button>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function selectToken(id){
  // deselect prev
  if(selectedToken!==null){
    const prev=document.getElementById('tok-'+selectedToken);
    if(prev) prev.style.outline='';
  }
  const el=document.getElementById('tok-'+id);
  const usedIds=clasificState.asignados.flat().map(x=>x.id);
  if(usedIds.includes(id)) return;
  if(selectedToken===id){selectedToken=null; return;}
  selectedToken=id;
  if(el) el.style.outline='3px solid #1e40af';
}

function dropToZona(zi){
  if(selectedToken===null) return;
  const q=questions[curQ];
  const item=clasificState.items.find(x=>x.id===selectedToken);
  if(!item) return;
  const usedIds=clasificState.asignados.flat().map(x=>x.id);
  if(usedIds.includes(item.id)) return;
  clasificState.asignados[zi].push(item);
  selectedToken=null;
  renderClasifUI(q);
}

function quitarDeZona(zi,id,e){
  e.stopPropagation();
  const q=questions[curQ];
  clasificState.asignados[zi]=clasificState.asignados[zi].filter(x=>x.id!==id);
  renderClasifUI(q);
}

function checkClasif(){
  if(answered) return;
  const q=questions[curQ];
  // todos clasificados?
  const total=clasificState.asignados.flat().length;
  if(total<q.items.length){
    const fb=document.getElementById('fb');
    if(fb){fb.textContent='¡Clasifica todos los elementos primero!';fb.className='feedback fb-err';}
    return;
  }
  answered=true;
  let correctos=0;
  clasificState.asignados.forEach((zona,zi)=>{
    zona.forEach(it=>{
      const chip=document.getElementById('chip-'+it.id);
      if(it.zona===zi){correctos++;if(chip)chip.classList.add('c-ok');}
      else{if(chip)chip.classList.add('c-err');}
    });
  });
  document.querySelector('.check-clasif-btn').disabled=true;
  showExp(q.exp);
  const pct=correctos/q.items.length;
  if(pct===1){
    score+=100; updHdr();
    setFb(true,'+100 puntos'); document.getElementById('mc').innerHTML=M_OK;
  } else if(pct>=0.5){
    score+=50; updHdr();
    setFb(true,'+50 puntos (parcial)'); document.getElementById('mc').innerHTML=M_OK;
  } else {
    score=Math.max(0,score-10); updHdr();
    setFb(false,'-10 puntos'); document.getElementById('mc').innerHTML=M_ERR;
  }
  setTimeout(()=>{curQ++;renderQ();},3000);
}

/* ── HELPERS ── */
function showExp(txt){
  const e=document.getElementById('exp');
  if(e){e.textContent=txt;e.classList.add('show');}
}
function setFb(ok,pts){
  const fb=document.getElementById('fb');
  const dl=document.getElementById('delta');
  if(fb){fb.textContent=ok?'¡Correcto!':'Incorrecto';fb.className='feedback '+(ok?'fb-ok':'fb-err');}
  if(dl){dl.textContent=pts;dl.className='delta '+(ok?'up':'down');}
}

/* ══════════════════════════════════════════
   RESULTADO
══════════════════════════════════════════ */
function showResult(){
  const now=new Date();
  const dateStr=now.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
  const timeStr=now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const max=questions.length*100;
  const pct=Math.round((score/max)*100);
  const stars=pct>=90?'★★★':pct>=60?'★★':'★';
  const msg=pct>=90?'¡Excelente! Dominas las normas APA 7.'
           :pct>=60?'¡Muy bien! Repasa los temas donde fallaste.'
           :'Revisa el material y vuelve a intentarlo.';
  document.getElementById('game-wrap').innerHTML=`
    <div class="result">
      <div style="display:flex;justify-content:center;margin-bottom:10px">${M_WIN}</div>
      <div class="res-title">¡Juego terminado!</div>
      <div class="res-stars" style="color:#eab308">${stars}</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:12px;line-height:1.5">${msg}</div>
      <div class="res-card">
        <div class="res-row"><span class="res-lbl">Jugador</span><span class="res-val">${playerName}</span></div>
        <div class="res-row"><span class="res-lbl">Fecha</span><span class="res-val">${dateStr}</span></div>
        <div class="res-row"><span class="res-lbl">Hora</span><span class="res-val">${timeStr}</span></div>
        <div class="res-row"><span class="res-lbl">Correctas</span><span class="res-val">${Math.round(score/100)} de ${questions.length}</span></div>
        <div class="res-row"><span class="res-lbl">Puntos obtenidos</span><span class="res-val">${score} / ${max} pts</span></div>
      </div>
      <button class="rbtn" onclick="startGame2()">Jugar de nuevo</button>
    </div>`;
  document.getElementById('hdr-score').textContent=score+' pts';
}

function startGame2(){
  score=0;curQ=0;answered=false;
  questions=shuffle(BANCO).slice(0,16);
  updHdr();renderQ();
}

/* inicio */
showName();
</script>
</html>
