

<!DOCTYPE html>

<style>
:root{--navy:#17324d;--navy2:#203f5f;--blue:#2f6699;--light:#e8f1fb;--ink:#1f2b37;--line:#d6e4f3;--ok:#18864b;--bad:#b83227;--warn:#8a4b08;--shadow:0 10px 25px rgba(0,0,0,.15)}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#dfeaf5;color:var(--ink)}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}aside{position:fixed;inset:0 auto 0 0;width:260px;background:var(--navy);color:#fff;padding:18px 14px;overflow:auto}.brand{font-weight:900;font-size:22px;margin:4px 8px 18px}.menu small{display:block;color:#9fc4e5;margin:18px 10px 8px;text-transform:uppercase;font-weight:800}.menu button{width:100%;border:0;text-align:left;padding:12px 14px;border-radius:12px;margin:6px 0;font-size:14px;font-weight:850;cursor:pointer}.menu .active{background:#4d75a3;color:white}.menu .locked{opacity:.38;cursor:not-allowed}.menu .open{background:#122a42;color:#d7ecff}
main{grid-column:2;padding:26px 28px 88px}.top{display:flex;justify-content:space-between;align-items:center;color:white;background:var(--navy2);padding:17px 22px;border-radius:0 0 18px 18px;margin:-26px -28px 24px;box-shadow:var(--shadow)}.top h1{font-size:23px;margin:0;font-weight:900}.slide{display:none;background:white;border-radius:18px;box-shadow:var(--shadow);overflow:hidden;min-height:calc(100vh - 150px)}.slide.active{display:block}.hero{background:var(--light);padding:32px 42px;text-align:center;border-bottom:1px solid var(--line)}.hero h2{font-size:36px;margin:0;color:#233241}.content{padding:28px 40px 38px}.card{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:18px}.register-card{max-width:430px;margin:0 auto;padding:18px}.card h3{margin:0 0 12px;color:#092c50;font-size:22px}input,textarea{width:100%;border:1px solid #c8d7e8;border-radius:12px;padding:13px;font-family:inherit;font-size:15px;background:#fbfdff}textarea{min-height:115px;resize:vertical}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:900;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.12);margin:6px 6px 6px 0}.primary{background:var(--blue);color:white}.secondary{background:#edf4fb;color:#17324d;border:1px solid #c9d9ea}.danger{background:#fff0ee;color:#8a1f17;border:1px solid #e8aaa2}.feedback{margin-top:12px;padding:12px;border-radius:12px;font-weight:800;display:none}.feedback.ok{display:block;background:#e3f7eb;color:#126c3a;border:1px solid #91d7ae}.feedback.bad{display:block;background:#fdecea;color:#922b21;border:1px solid #e8aaa2}.feedback.warn{display:block;background:#fff4e5;color:#8a4b08;border:1px solid #efc17d}.mini{background:#eef6ff;border-left:5px solid var(--blue);padding:13px 15px;border-radius:10px;margin:13px 0}.note{background:#f2fff0;border-left:5px solid #62d84e;padding:13px 15px;border-radius:10px;margin:13px 0}.reading{background:white;border:3px solid #3c6694;border-radius:14px;padding:20px;line-height:1.85;font-size:16px}.chunk{padding:3px 5px;border-radius:6px;cursor:pointer}.chunk:hover{background:#e7f1fb}.chunk.selected{background:#c9efd8;outline:2px solid #53b874}.chunk.evidence{background:#edf8ff;box-shadow:inset 0 0 0 2px #7fb3d5}.chunk.wrong{background:#ffd9d4;outline:2px solid #c0392b}.chunk.locked{cursor:default}.kw{display:inline-block;padding:1px 3px;border-radius:5px;cursor:pointer}.kw:hover{background:#fff6c7}.kw.marked{background:#ffed99;outline:1px solid #d4a017}.kw.nope{background:#ffd9d4;outline:1px solid #c0392b}.kw.stop{color:#6b7b8a}.kw.stop:hover{background:#f1f4f8}.progress{height:10px;background:#d9e6f4;border-radius:999px;overflow:hidden;margin:10px 0 2px}.bar{height:100%;background:#2f6699;transition:.3s}.idea-list{padding-left:20px;line-height:1.6}.idea-list li{margin-bottom:8px}.modal{display:none;position:fixed;inset:0;background:rgba(13,30,48,.72);z-index:99;justify-content:center;align-items:center;padding:24px}.modal.show{display:flex}.modal-box{width:min(760px,96vw);background:white;border-radius:20px;box-shadow:var(--shadow);overflow:hidden}.modal-head{background:#4f7fb3;color:white;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}.modal-head h3{margin:0;font-size:24px}.modal-body{padding:24px;font-size:17px;line-height:1.55}.close{background:white;color:#264d75;border:0;font-weight:900;border-radius:10px;padding:8px 12px;cursor:pointer}.lesson-actions{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.lesson-box{border:1px solid var(--line);border-radius:14px;padding:14px;background:#f8fbff;margin-top:8px}.parts-img{max-width:100%;border:1px solid #ddd;border-radius:12px;background:#f8f1e6;padding:8px}footer{position:fixed;left:260px;right:0;bottom:0;background:#17324d;color:white;padding:13px 24px;font-weight:900;display:flex;justify-content:space-between;align-items:center;z-index:50}.nav button{background:#355d88;color:white;border:1px solid #517aa7;padding:9px 16px;border-radius:10px;font-weight:900;cursor:pointer;margin-left:8px}.nav button:disabled{opacity:.35;cursor:not-allowed}@media(max-width:900px){.app{grid-template-columns:1fr}aside{position:relative;width:auto}main{grid-column:1;padding:18px}.top{margin:-18px -18px 18px}.hero h2{font-size:29px}footer{left:0}.content{padding:22px}}
</style>
</head><body>
<div class="app"><aside><div class="brand">Menu</div><div class="menu" id="menu"></div></aside><main>
<header class="top"><h1>Resumen académico</h1></header>
<section class="slide active" id="slide0"><div class="hero"><h2>Registro</h2></div><div class="content"><div class="card register-card"><h3>Registro de ingreso</h3><input id="studentName" placeholder="Nombre completo"><br><br><input id="studentNrc" placeholder="NRC"><br><br><button class="btn primary" onclick="startRoute()">Start</button><div id="fbRegister" class="feedback"></div></div></div></section>
<section class="slide" id="slide1"><div class="hero"><h2>Initial idea</h2></div><div class="content"><div class="card"><h3>Write your initial idea</h3><p>What do you think a summary is?</p><textarea id="preSummary" placeholder="Write your initial idea..."></textarea><button class="btn primary" onclick="saveInitialIdea()">Submit idea</button><div id="fbPreSummary" class="feedback"></div></div></div></section>
<section class="slide" id="slide2"><div class="hero"><h2 id="exerciseTitle">Ejercicio: reconocer ideas clave</h2></div><div class="content"><div id="paragraphExercise"></div></div></section>
<section class="slide" id="slide3"><div class="hero"><h2>Full reading and summary</h2></div><div class="content"><div id="completeExercise"></div></div></section>
<section class="slide" id="slide4"><div class="hero"><h2>Cierre</h2></div><div class="content"><div class="card"><h3>Información guardada</h3><div id="finalData"></div><button class="btn secondary" onclick="downloadData()">Download record</button></div></div></section>
</main></div>
<footer><div>Aprendiendo con @LaProfeVivy</div><div class="nav"><button id="prevBtn" onclick="move(-1)">‹ PREV</button><button id="nextBtn" onclick="move(1)">NEXT ›</button></div></footer>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle"></h3><button class="close" onclick="closeModal()">Close ✕</button></div><div class="modal-body" id="modalBody"></div></div></div>
<script>
'use strict';
let current=0, unlocked=0, pIndex=0, lockedParagraph=false, paragraphPhase='main';
let student={name:'',nrc:''};
let record={initialIdea:'',paragraphIdeas:[],paragraphSecondary:[],paragraphKeywords:[],paragraphSecondaryKeywords:[],summary:'',date:''};
const menuItems=[,['Conceptual Framework',1],['Guided Application',2],['Learning Validation',3],['Closure',4]];
const textData={
 title:'La inteligencia artificial en la medicina contemporánea',
 source:'Lectura académica adaptada con información general sobre usos, límites y retos de la inteligencia artificial en salud.',
 paragraphs:[
  {chunks:[
   {t:'En los últimos años, hospitales, laboratorios y centros de investigación han incorporado sistemas capaces de procesar historias clínicas, imágenes diagnósticas y resultados de laboratorio.',why:'Es contexto: presenta dónde aparece la IA, pero todavía no formula la idea central.'},
   {t:'Algunos de estos sistemas comparan miles de registros en segundos y sugieren patrones que podrían pasar inadvertidos en una revisión manual.',why:'Es un ejemplo de capacidad técnica, no la idea principal completa.'},
   {t:'Sin embargo, el valor de la inteligencia artificial en medicina no está solo en la velocidad, sino en apoyar decisiones clínicas con información organizada y revisable.',key:true,why:'Correcto: esta frase no está al inicio y concentra la idea principal del párrafo.'},
   {t:'Por eso, su uso debe entenderse como una ayuda para analizar mejor los casos, no como una sustitución automática del criterio profesional.',sec:true,why:'Correcto: es una idea secundaria importante porque aclara el límite del uso de IA.'},
   {t:'Cuando se integra con protocolos claros, puede mejorar la oportunidad del diagnóstico y facilitar el seguimiento de pacientes con condiciones complejas.',why:'Es una consecuencia o beneficio, pero depende de la idea central anterior.'}
  ]},
  {chunks:[
   {t:'El análisis de imágenes médicas es uno de los campos donde la inteligencia artificial se ha hecho más visible.',sec:true,why:'Correcto: es una idea secundaria que introduce el área específica del párrafo.'},
   {t:'En radiografías, tomografías y resonancias, los algoritmos pueden señalar zonas que merecen revisión porque se parecen a patrones asociados con lesiones, tumores o enfermedades respiratorias.',why:'Es un ejemplo técnico del uso en imágenes.'},
   {t:'Este apoyo puede ser útil en servicios con alta demanda, especialmente cuando ayuda a priorizar casos urgentes.',why:'Es un beneficio puntual, no la idea central.'},
   {t:'La interpretación final debe seguir en manos de profesionales de salud, porque una señal automática puede equivocarse si los datos de entrenamiento son limitados o poco diversos.',key:true,why:'Correcto: esta es la idea principal porque plantea el mensaje central del párrafo: la IA ayuda, pero requiere interpretación profesional.'},
   {t:'En consecuencia, la calidad del sistema depende tanto del algoritmo como de la supervisión humana que revisa sus resultados.',why:'Es una conclusión derivada de la idea principal.'}
  ]},
  {chunks:[
   {t:'La inteligencia artificial también se utiliza para anticipar riesgos de enfermedad antes de que aparezcan complicaciones graves.',why:'Es una apertura temática, pero no desarrolla por completo la idea principal.'},
   {t:'Para lograrlo, algunos modelos combinan antecedentes médicos, edad, hábitos, síntomas y resultados de exámenes con el fin de estimar probabilidades.',sec:true,why:'Correcto: es una idea secundaria porque explica cómo se hace el análisis preventivo.'},
   {t:'Estos cálculos no significan que una persona enfermará con certeza, sino que permiten orientar controles, recomendaciones o tratamientos tempranos.',key:true,why:'Correcto: esta frase contiene la idea principal porque explica el sentido real de la predicción: orientar acciones preventivas sin afirmar certezas.'},
   {t:'Si los resultados se presentan sin explicación, pueden generar miedo, confusión o decisiones innecesarias.',why:'Es una advertencia relevante, pero no es el eje del párrafo.'},
   {t:'Por esa razón, la prevención apoyada por IA necesita comunicación clara entre el equipo médico y el paciente.',why:'Es una consecuencia práctica de la idea anterior.'}
  ]},
  {chunks:[
   {t:'En el tratamiento, no todos los pacientes responden igual a un medicamento, una dosis o una intervención clínica.',sec:true,why:'Correcto: es una idea secundaria porque justifica la necesidad de personalizar el tratamiento.'},
   {t:'Las diferencias pueden depender de la edad, el peso, otras enfermedades, la genética, el estilo de vida o medicamentos que ya se estén usando.',why:'Es un listado de factores que amplía la idea secundaria.'},
   {t:'Frente a esa diversidad, los sistemas inteligentes pueden comparar casos similares y ofrecer información adicional para valorar alternativas terapéuticas.',key:true,why:'Correcto: esta es la idea principal porque explica cómo la IA apoya tratamientos personalizados.'},
   {t:'La recomendación generada por una máquina no debe asumirse como orden definitiva, sino como un insumo que el equipo médico analiza junto con la historia del paciente.',why:'Es una aclaración ética y clínica, no el centro del párrafo.'},
   {t:'Usada con cuidado, esta información puede reducir intervenciones innecesarias y mejorar la precisión de algunas decisiones.',why:'Es un beneficio derivado.'}
  ]},
  {chunks:[
   {t:'El avance de la inteligencia artificial en salud también abre preguntas éticas que no pueden dejarse para el final.',key:true,why:'Correcto: aunque está al inicio, es la idea principal porque todo el párrafo desarrolla los retos éticos.'},
   {t:'Los datos médicos contienen información sensible sobre diagnósticos, antecedentes familiares, tratamientos, hábitos y condiciones personales.',sec:true,why:'Correcto: es una idea secundaria importante porque explica por qué los datos médicos requieren protección.'},
   {t:'Si esa información se usa sin consentimiento o sin seguridad suficiente, pueden aparecer riesgos de discriminación, exposición o pérdida de confianza.',why:'Es una consecuencia del mal manejo de datos.'},
   {t:'Además, un algoritmo entrenado con datos incompletos puede reproducir sesgos y ofrecer resultados menos confiables para ciertos grupos de pacientes.',why:'Es otro riesgo ético relevante, pero no resume todo el párrafo.'},
   {t:'Por eso, la innovación tecnológica necesita normas claras, transparencia y supervisión humana constante.',why:'Es una recomendación final derivada de la idea principal.'}
  ]}
 ]
};
function words(s){return (s||'').trim().split(/\s+/).filter(Boolean).length}
function hasMeaning(s,min){const clean=(s||'').trim().toLowerCase();if(words(clean)<min)return false;const compact=clean.replace(/\s/g,'');let repeated=1;for(let i=1;i<compact.length;i++){if(compact[i]===compact[i-1]){repeated++;if(repeated>8)return false}else repeated=1}return /[aeiouáéíóú]/.test(clean)}
function feedback(id,type,msg){const e=document.getElementById(id);if(e){e.className='feedback '+type;e.innerHTML=msg}}
function buildMenu(){const m=document.getElementById('menu');m.innerHTML='<small></small>';menuItems.forEach(function(it){const b=document.createElement('button');b.textContent=it[0];b.className=(current===it[1]?'active ':'')+(it[1]>unlocked?'locked':'open');b.onclick=function(){if(it[1]<=unlocked)go(it[1])};m.appendChild(b)})}
function go(i){current=i;document.querySelectorAll('.slide').forEach(function(s,x){s.classList.toggle('active',x===i)});document.getElementById('prevBtn').disabled=i===0;document.getElementById('nextBtn').disabled=i>=unlocked;buildMenu();if(i===2)renderParagraph();if(i===3)renderCompleteExercise();if(i===4)renderFinal()}
function unlock(i){if(i>unlocked)unlocked=i;buildMenu();document.getElementById('nextBtn').disabled=current>=unlocked}
function move(d){const n=current+d;if(n>=0&&n<=unlocked)go(n)}
function openModal(t,b){document.getElementById('modalTitle').innerHTML=t;document.getElementById('modalBody').innerHTML=b;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show');if(current===1){unlock(2);go(2)}}
function startRoute(){const name=document.getElementById('studentName').value.trim();const nrc=document.getElementById('studentNrc').value.trim();if(words(name)<2||nrc.length<2){feedback('fbRegister','bad','Complete your full name and NRC.');return}student={name:name,nrc:nrc};feedback('fbRegister','ok','Registration ready.');unlock(1);setTimeout(function(){go(1)},300)}
function saveInitialIdea(){const v=document.getElementById('preSummary').value.trim();if(!hasMeaning(v,8)){feedback('fbPreSummary','bad','Write a complete and coherent idea.');return}record.initialIdea=v;feedback('fbPreSummary','ok','Idea saved. The microclass will open.');setTimeout(openLesson,300)}
function openLesson(){openModal('Summary','<p><strong>Summary:</strong> a short text that keeps the main meaning.</p><div class="lesson-actions"><button class="btn secondary" onclick="showLesson(\'length\')">Extension</button><button class="btn secondary" onclick="showLesson(\'parts\')">Parts</button><button class="btn secondary" onclick="showLesson(\'steps\')">Steps</button></div><div id="lessonBox" class="lesson-box"><p><strong>Concept:</strong> one clear sentence with the essential meaning.</p></div>')}
function showLesson(type){const b=document.getElementById('lessonBox');if(type==='length')b.innerHTML='<p><strong>Extension:</strong> the summary should be between 25% and 35% of the original text.</p>';if(type==='parts')b.innerHTML='<div style="display:grid;gap:10px"><div style="border:3px solid #08798a;padding:10px;border-radius:8px"><strong>Heading:</strong> title, author, date.</div><div style="border:3px solid #e9866f;padding:10px;border-radius:8px"><strong>Introduction:</strong> topic and original author.</div><div style="border:3px solid #18b86b;padding:10px;border-radius:8px"><strong>Body:</strong> main idea and key supporting ideas.</div><div style="border:3px solid #7037d8;padding:10px;border-radius:8px"><strong>Conclusion:</strong> final meaning of the text.</div></div>';if(type==='steps')b.innerHTML='<ol><li>Read the paragraph.</li><li>Mark key words.</li><li>Select the sentence with the key idea.</li><li>Check and improve.</li><li>Write one summary paragraph.</li></ol>'}
function fullText(){return textData.paragraphs.map(p=>p.chunks.map(c=>c.t).join(' ')).join('\n\n')}
const targets={
 main:[
  {chunk:2,words:['valor','inteligencia','artificial','medicina','velocidad','apoyar','decisiones','clínicas','información'],why:'porque no se queda en el dato técnico; explica el sentido central de la IA en medicina: apoyar decisiones clínicas con información organizada.'},
  {chunk:3,words:['interpretación','final','profesionales','salud','señal','automática','equivocarse','datos'],why:'porque el párrafo no solo habla de imágenes; insiste en que el resultado automático debe ser interpretado por profesionales.'},
  {chunk:2,words:['cálculos','persona','enfermará','certeza','orientar','controles','recomendaciones','tratamientos','tempranos'],why:'porque aclara el mensaje principal: la predicción no es certeza, sirve para orientar prevención.'},
  {chunk:2,words:['sistemas','inteligentes','comparar','casos','similares','información','alternativas','terapéuticas'],why:'porque resume cómo la IA apoya decisiones de tratamiento personalizadas.'},
  {chunk:0,words:['avance','inteligencia','artificial','salud','preguntas','éticas'],why:'porque todo el párrafo desarrolla retos éticos del uso de IA en salud.'}
 ],
 secondary:[
  {chunk:3,words:['ayuda','analizar','casos','sustitución','criterio','profesional'],why:'porque refuerza la idea principal indicando el límite: la IA acompaña, no reemplaza.'},
  {chunk:0,words:['análisis','imágenes','médicas','campo','inteligencia','artificial','visible'],why:'porque ubica el campo específico donde se aplica el argumento del párrafo.'},
  {chunk:1,words:['modelos','antecedentes','edad','hábitos','síntomas','exámenes','probabilidades'],why:'porque explica el procedimiento que permite anticipar riesgos.'},
  {chunk:0,words:['pacientes','responden','igual','medicamento','dosis','intervención','clínica'],why:'porque justifica por qué se necesitan tratamientos personalizados.'},
  {chunk:1,words:['datos','médicos','información','sensible','diagnósticos','antecedentes','tratamientos','hábitos'],why:'porque explica la base del problema ético: la sensibilidad de la información médica.'}
 ]
};
function cleanWord(w){return (w||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zñ]/g,'')}
const stopWords=['a','al','ante','bajo','cabe','con','contra','de','del','desde','durante','e','el','ella','ellas','ellos','en','entre','era','es','esa','ese','eso','esta','este','estos','estas','ha','hacia','hasta','hay','la','las','le','les','lo','los','mas','más','me','mi','mientras','muy','no','o','para','pero','por','que','se','si','sin','sobre','son','su','sus','tambien','también','un','una','unas','uno','unos','y','ya'];
function currentTarget(){return targets[paragraphPhase][pIndex]}
function showTip(type,msg){const fb=document.getElementById('fbParagraph');if(!fb)return;fb.className='feedback '+type;fb.innerHTML=msg}
function renderWords(txt,pi,ci){const keys=(currentTarget().words||[]).map(cleanWord);return txt.split(/(\s+)/).map(function(part){if(/^\s+$/.test(part))return part;const cw=cleanWord(part);const isStop=stopWords.includes(cw);const isKey=keys.includes(cw);return '<span class="kw '+(isStop?'stop':'')+'" data-key="'+(isKey?'1':'0')+'" data-stop="'+(isStop?'1':'0')+'" onclick="markWord(event,this)">'+part+'</span>'}).join('')}
function refreshSentenceLight(){document.querySelectorAll('#readingP .chunk').forEach(function(ch){const marked=[...ch.querySelectorAll('.kw.marked')];ch.classList.toggle('evidence',marked.length>0);const good=marked.filter(w=>w.dataset.key==='1').length;if(good>=2){document.querySelectorAll('#readingP .chunk').forEach(e=>e.classList.remove('selected','wrong'));ch.classList.add('selected')}})}
function markWord(ev,el){ev.stopPropagation();if(lockedParagraph)return;const word=el.textContent.trim();if(el.dataset.stop==='1'){el.classList.add('nope');showTip('warn','“'+word+'” is not a keyword: it is a linking word. Look for nouns, actions or important concepts.');setTimeout(function(){el.classList.remove('nope')},800);return}if(el.dataset.key!=='1'){el.classList.add('nope');showTip('warn','“'+word+'” does not support the idea requested in this part. Look for stronger words inside the key sentence.');setTimeout(function(){el.classList.remove('nope')},900);return}el.classList.toggle('marked');refreshSentenceLight();showTip('ok','Good: that word supports the idea. When you select enough correct words, the sentence lights up so you can check it.')}
function textWordCount(){return words(fullText())}
function renderParagraph(){
lockedParagraph=false;
const p=textData.paragraphs[pIndex];
const label=paragraphPhase==='main'?'Part 1: keywords and main idea':'Part 2: keywords and supporting idea';
document.getElementById('exerciseTitle').textContent='Exercise: paragraph '+(pIndex+1)+' of '+textData.paragraphs.length;
let guide=paragraphPhase==='main'
? 'Select keywords that support the main idea. Empty words are not accepted. When you select enough correct words, the sentence will light up; then check it.'
: 'Select keywords that support an important supporting idea. Empty words are not accepted. When you select enough correct words, the sentence will light up; then check it.';
let html='<div class="card"><h3>'+textData.title+'</h3><div class="mini"><strong>'+label+'</strong><br>'+guide+'</div><div class="progress"><div class="bar" style="width:'+((pIndex+(paragraphPhase==='secondary'?0.5:0))/textData.paragraphs.length*100)+'%"></div></div><div class="reading" id="readingP">';
p.chunks.forEach(function(c,i){html+='<span class="chunk" id="ch'+i+'" onclick="selectChunk('+i+')">'+renderWords(c.t,pIndex,i)+'</span> '});
html+='</div><button class="btn primary" onclick="verifyParagraph()">Check</button><button class="btn danger" onclick="resetParagraph()">Restart</button><div id="fbParagraph" class="feedback"></div><div id="nextBox"></div></div>';
document.getElementById('paragraphExercise').innerHTML=html
}
function selectChunk(i){if(lockedParagraph)return;document.querySelectorAll('#readingP .chunk').forEach(e=>e.classList.remove('selected','wrong'));document.getElementById('ch'+i).classList.add('selected')}
function verifyParagraph(){
 const selected=document.querySelector('#readingP .chunk.selected');
 const target=currentTarget();
 const allMarked=[...document.querySelectorAll('#readingP .kw.marked')];
 if(allMarked.length<2){feedback('fbParagraph','warn','First, select at least two valid keywords. Words like “para”, “de”, “el”, “y” or “que” do not count.');return}
 if(!selected){feedback('fbParagraph','warn','Now click the sentence that contains the idea you want to check.');return}
 const idx=Number(selected.id.replace('ch',''));
 const markedInside=[...selected.querySelectorAll('.kw.marked')];
 if(markedInside.length<2){feedback('fbParagraph','warn','The keywords must be inside the sentence you selected. Select at least two and check again.');return}
 const goodMarked=markedInside.filter(w=>w.dataset.key==='1').length;
 if(goodMarked<2){feedback('fbParagraph','bad','You selected words inside the sentence, but they do not strongly support the idea. Press Restart and look for stronger words: topic, action or central concept.');return}
 const c=textData.paragraphs[pIndex].chunks[idx];
 if(idx!==target.chunk){
   selected.classList.add('wrong');
   feedback('fbParagraph','bad','Not yet. That sentence gives information, but it is not the one requested in this part. Press Restart and try again.');
   return;
 }
 lockedParagraph=true;
 document.querySelectorAll('#readingP .chunk,#readingP .kw').forEach(e=>e.classList.add('locked'));
 const selectedWords=markedInside.map(w=>w.textContent.trim()).filter(Boolean).join(', ');
 if(paragraphPhase==='main'){
   record.paragraphIdeas[pIndex]=c.t;
   record.paragraphKeywords[pIndex]=selectedWords;
   feedback('fbParagraph','ok','Correct. That sentence contains the main idea, '+target.why);
   document.getElementById('nextBox').innerHTML='<button class="btn primary" onclick="startSecondaryPhase()">Continue with supporting idea</button>';
 }else{
   record.paragraphSecondary[pIndex]=c.t;
   record.paragraphSecondaryKeywords[pIndex]=selectedWords;
   feedback('fbParagraph','ok','Correct. That sentence contains an important supporting idea, '+target.why);
   document.getElementById('nextBox').innerHTML=pIndex<textData.paragraphs.length-1?'<button class="btn primary" onclick="nextParagraph()">Next paragraph</button>':'<button class="btn primary" onclick="finishParagraphs()">See full reading</button>';
 }
}
function startSecondaryPhase(){paragraphPhase='secondary';renderParagraph()}
function resetParagraph(){renderParagraph()}
function nextParagraph(){pIndex++;paragraphPhase='main';renderParagraph()}
function finishParagraphs(){unlock(3);go(3)}
function renderCompleteExercise(){const total=textWordCount(), min=Math.round(total*.25), max=Math.round(total*.35);let html='<div class="card"><h3>'+textData.title+'</h3><div class="source">'+textData.source+'</div><div class="mini"><strong>Original text:</strong> '+total+' words. <strong>Expected summary:</strong> '+min+' to '+max+' words.</div><div class="reading">'+textData.paragraphs.map(p=>'<p>'+p.chunks.map(c=>c.t).join(' ')+'</p>').join('')+'</div></div>';
html+='<div class="card"><h3>Ideas seleccionadas</h3><ol class="idea-list">'+record.paragraphIdeas.map((i,idx)=>'<li><strong>Idea principal:</strong> '+i+'<br><small><strong>Palabras clave:</strong> '+((record.paragraphKeywords||[])[idx]||'')+'</small><br><strong>Idea secundaria:</strong> '+((record.paragraphSecondary||[])[idx]||'')+'<br><small><strong>Palabras clave secundarias:</strong> '+((record.paragraphSecondaryKeywords||[])[idx]||'')+'</small></li>').join('')+'</ol></div>';
html+='<div class="card"><h3>Write your summary</h3><p>Write one paragraph in your own words. Keep the meaning of the key ideas without copying the whole text.</p><textarea id="finalSummary" oninput="updateCount()" placeholder="Write your summary here in one paragraph..."></textarea><div class="mini" id="countBox">0 words / expected range: '+min+' to '+max+'</div><button class="btn primary" onclick="saveSummary()">Submit summary</button><div id="fbSummary" class="feedback"></div></div>';
document.getElementById('completeExercise').innerHTML=html}
function updateCount(){const total=textWordCount(), min=Math.round(total*.25), max=Math.round(total*.35), n=words(document.getElementById('finalSummary').value);document.getElementById('countBox').innerHTML=n+' words / expected range: '+min+' to '+max}
function saveSummary(){const total=textWordCount(), min=Math.round(total*.25), max=Math.round(total*.35), v=document.getElementById('finalSummary').value.trim(), n=words(v);if(n<min||n>max||!hasMeaning(v,25)){feedback('fbSummary','bad','Not saved yet. It has '+n+' words. It must be between '+min+' and '+max+' words and make sense.');return}record.summary=v;record.date=new Date().toLocaleString('es-CO');feedback('fbSummary','ok','Summary saved correctly.');unlock(4);setTimeout(function(){go(4)},500)}
function renderFinal(){document.getElementById('finalData').innerHTML='<p><strong>Nombre:</strong> '+student.name+'</p><p><strong>NRC:</strong> '+student.nrc+'</p><p><strong>Fecha y hora:</strong> '+record.date+'</p><p><strong>Idea inicial:</strong> '+record.initialIdea+'</p><p><strong>Resumen final:</strong></p><div class="mini">'+record.summary+'</div>'}
function downloadData(){const data={student,record,text:textData.title};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='registro_resumen_'+(student.nrc||'nrc')+'.json';a.click();URL.revokeObjectURL(a.href)}
buildMenu();go(0);
</script>
