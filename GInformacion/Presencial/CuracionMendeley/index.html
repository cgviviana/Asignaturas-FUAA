
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guía - Gestor de referencias en Mendeley</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__title">Guía de curación documental en Mendeley</div>
      <div class="topbar__subtitle">Aprendiendo con @LaProfeVivy</div>
    </div>
  </header>

  <main class="wrap">
    <div class="controls" aria-label="Controles">
      <button id="prevBtn" class="btn" type="button" aria-label="Página anterior">◀</button>
      <div class="status" id="status">Página 1 / 8</div>
      <button id="nextBtn" class="btn" type="button" aria-label="Página siguiente">▶</button>
    </div>

    <div class="book" id="book" aria-label="Flipbook">
      <div class="sheet" id="sheet" aria-live="polite">
        <div class="side front">
          <img id="frontImg" alt="Página actual" />
        </div>
        <div class="side back">
          <img id="backImg" alt="Página siguiente/anterior" />
        </div>
      </div>
    </div>

    <div class="hint">
     Puedes usar las teclas <b>←</b> y <b>→</b>.
    </div>
  </main>

  <script>
    window.FLIP_PAGES = [
      "pages/page-1.png",
      "pages/page-2.png",
      "pages/page-3.png",
      "pages/page-4.png",
      "pages/page-5.png",
      "pages/page-6.png",
      "pages/page-7.png",
      "pages/page-8.png"
    ];
    window.FLIP_ASPECT = 0.7071084981293426;
  </script>
  <script src="assets/script.js"></script>
</body>
</html>
