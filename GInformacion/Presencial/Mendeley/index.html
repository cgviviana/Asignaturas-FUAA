<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guía - Flip</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__title">Guía de recolección de artículos</div>
      <div class="topbar__subtitle">Aprendiendo con @LaProfeVivy</div>
    </div>
  </header>

  <main class="wrap">
    <div class="controls" aria-label="Controles">
      <button id="prevBtn" class="btn" type="button" aria-label="Página anterior">◀</button>
      <div class="status" id="status">Página 1 / 9</div>
      <button id="nextBtn" class="btn" type="button" aria-label="Página siguiente">▶</button>
    </div>

    <div class="book" id="book" aria-label="Flipbook">
      <div class="sheet" id="sheet" aria-live="polite">
        <div class="side front">
          <img id="frontImg" alt="Página actual" />
        </div>
        <div class="side back">
          <img id="backImg" alt="Página siguiente/anterior" />
        </div>
      </div>
    </div>

    <div class="hint">
      Tip: también puedes usar las teclas <b>←</b> y <b>→</b>.
    </div>
  </main>

  <script>
    window.FLIP_PAGES = ["page-001.jpg", "page-002.jpg", "page-003.jpg", "page-004.jpg", "page-005.jpg", "page-006.jpg", "page-007.jpg", "page-008.jpg", "page-009.jpg"];
    window.FLIP_ASPECT = 0.7072446555819477;
  </script>
  <script src="assets/script.js"></script>
</body>
</html>
