<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patrones y más en el pensamiento algorítmico</title>
  <style>
    :root {
      --bg1: #eef7ff;
      --bg2: #fff8e7;
      --card: #ffffff;
      --text: #24324a;
      --muted: #5c6e8d;
      --line: #d9e7f7;
      --good: #1f9f5a;
      --bad: #d9534f;
      --shadow: 0 12px 30px rgba(36, 50, 74, 0.12);
      --radius: 24px;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg1) 0%, #f8fbff 45%, var(--bg2) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      background: linear-gradient(135deg, #7fd7ff, #9cf0c1, #ffe082);
      border-radius: 30px;
      padding: 26px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(2rem, 4.6vw, 3.4rem);
      line-height: 1.05;
    }

    .hero h1 span {
      display: block;
      font-size: clamp(1.1rem, 2.8vw, 1.9rem);
      margin-top: 6px;
    }

    .levels-bar {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .level-btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 10px;
      background: rgba(255,255,255,0.9);
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .level-btn:hover { transform: translateY(-2px); }

    .level-btn.active {
      background: #ffffff;
      outline: 3px solid rgba(59,130,246,0.28);
    }

    .toolbar {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      color: var(--text);
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
      transition: transform 0.15s ease;
    }

    .button:hover, .choice:hover, .step:hover { transform: translateY(-2px) scale(1.02); }
    .button:active, .choice:active, .step:active { transform: scale(0.98); }

    .meta {
      margin-top: 18px;
      background: rgba(255,255,255,0.88);
      border-radius: 22px;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .meta-box {
      background: #fff;
      border: 1px solid #edf3fb;
      border-radius: 18px;
      padding: 12px 14px;
      min-height: 72px;
    }

    .meta-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .meta-value {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      margin-top: 22px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      min-height: 330px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 14px;
      font-size: 0.98rem;
      font-weight: 700;
      color: #4c6183;
    }

    .pattern-row, .choices, .steps, .count-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .token, .blank, .step, .count-token {
      width: 70px;
      height: 70px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      background: #f4f8ff;
      border: 3px dashed #d3e3ff;
    }

    .token, .count-token {
      border-style: solid;
      background: #fff;
    }

    .blank {
      color: #9aaed1;
      background: #fff8dc;
    }

    .choice {
      min-width: 82px;
      min-height: 82px;
      border-radius: 22px;
      border: none;
      font-size: 1.8rem;
      font-weight: 800;
      background: #f7fbff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      cursor: pointer;
      color: var(--text);
      padding: 8px 12px;
    }

    .choice.choice-text {
      font-size: 1rem;
      min-width: 120px;
      min-height: 70px;
    }

    .feedback {
      min-height: 34px;
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 900;
      text-align: center;
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }

    .step {
      width: 88px;
      height: 88px;
      background: #fff;
      flex-direction: column;
      gap: 6px;
      text-align: center;
      padding: 8px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }

    .step span {
      font-size: 0.82rem;
      line-height: 1.05;
      font-weight: 800;
    }

    .step.done {
      outline: 4px solid #9fe870;
      background: #f4ffe9;
    }

    .big-center {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      min-height: 110px;
      text-align: center;
      line-height: 1.2;
      flex-wrap: wrap;
      gap: 6px;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      font-size: 1rem;
      font-weight: 900;
      color: #58708e;
    }

    @media (max-width: 980px) {
      .levels-bar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .meta { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .levels-bar { grid-template-columns: 1fr; }
      .token, .blank, .count-token { width: 60px; height: 60px; font-size: 1.7rem; }
      .choice { min-width: 72px; min-height: 72px; font-size: 1.5rem; }
      .choice.choice-text { min-width: 100px; min-height: 64px; font-size: 0.92rem; }
      .step { width: 76px; height: 76px; }
      .card { min-height: 290px; }
      .big-center { font-size: 2.4rem; }
    }
  </style>
</head>

      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'es-ES';
      utter.rate = 0.95;
      window.speechSynthesis.speak(utter);
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function disableChildren(node) {
      [...node.children].forEach(child => child.disabled = true);
    }

    function renderLevelButtons() {
      const box = document.getElementById('levelButtons');
      box.innerHTML = '';
      levels.forEach((level, index) => {
        const btn = document.createElement('button');
        btn.className = 'level-btn' + (index === currentLevel ? ' active' : '');
        btn.textContent = level.button;
        btn.onclick = () => {
          currentLevel = index;
          renderAll();
        };
        box.appendChild(btn);
      });
    }

    function renderHeader() {
      const level = levels[currentLevel];
      document.getElementById('levelTitle').textContent = level.title;      document.getElementById('levelFocus').textContent = level.focus;
    }

    function setTitles(level) {
      document.getElementById('title1').textContent = level.board1.title;
      document.getElementById('subtitle1').textContent = level.board1.subtitle;
      document.getElementById('title2').textContent = level.board2.title;
      document.getElementById('subtitle2').textContent = level.board2.subtitle;
      document.getElementById('title3').textContent = level.board3.title;
      document.getElementById('subtitle3').textContent = level.board3.subtitle;
      document.getElementById('title4').textContent = level.board4.title;
      document.getElementById('subtitle4').textContent = level.board4.subtitle;
      document.getElementById('title5').textContent = level.board5.title;
      document.getElementById('subtitle5').textContent = level.board5.subtitle;
      document.getElementById('title6').textContent = level.board6.title;
      document.getElementById('subtitle6').textContent = level.board6.subtitle;
    }

    function renderPatternGame({rowId, choicesId, feedbackId, sequence, answer, options, okText, helpText, voiceOk}) {
      const row = document.getElementById(rowId);
      const choices = document.getElementById(choicesId);
      const feedback = document.getElementById(feedbackId);
      row.innerHTML = '';
      choices.innerHTML = '';
      feedback.textContent = '';
      feedback.className = 'feedback';

      sequence.forEach(item => {
        const token = document.createElement('div');
        token.className = 'token';
        token.textContent = item;
        row.appendChild(token);
      });

      const blank = document.createElement('div');
      blank.className = 'blank';
      blank.textContent = '❓';
      row.appendChild(blank);

      shuffle(options).forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        if (String(option).length > 2 && !/^[\p{Emoji}\p{Extended_Pictographic}\d]+$/u.test(String(option))) {
          btn.classList.add('choice-text');
        }
        btn.textContent = option;
        btn.onclick = () => {
          if (option === answer) {
            blank.textContent = answer;
            blank.style.borderStyle = 'solid';
            blank.style.background = '#f1ffea';
            feedback.textContent = okText;
            feedback.classList.add('good');
            speak(voiceOk || 'Correcto.');
            disableChildren(choices);
          } else {
            feedback.textContent = helpText;
            feedback.classList.add('bad');
            speak('Revisa la regla.');
          }
        };
        choices.appendChild(btn);
      });
    }

    function renderInlinePatternGame(board) {
      const row = document.getElementById('pattern3Row');
      const choices = document.getElementById('pattern3Choices');
      const feedback = document.getElementById('pattern3Feedback');
      row.textContent = board.row;
      choices.innerHTML = '';
      feedback.textContent = '';
      feedback.className = 'feedback';

      shuffle(board.options).forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        if (String(option).length > 2 && !/^[\p{Emoji}\p{Extended_Pictographic}\d]+$/u.test(String(option))) {
          btn.classList.add('choice-text');
        }
        btn.textContent = option;
        btn.onclick = () => {
          if (option === board.answer) {
            row.textContent = board.finalRow;
            feedback.textContent = board.okText;
            feedback.classList.add('good');
            speak('Correcto.');
            disableChildren(choices);
          } else {
            feedback.textContent = board.helpText;
            feedback.classList.add('bad');
            speak('Revisa la secuencia.');
          }
        };
        choices.appendChild(btn);
      });
    }

    function renderStepsGame(board) {
      const container = document.getElementById('stepsGame');
      const feedback = document.getElementById('stepsFeedback');
      const correct = board.steps.map(step => step.icon);
      let current = 0;
      const steps = shuffle(board.steps);

      container.innerHTML = '';
      feedback.textContent = '';
      feedback.className = 'feedback';

      steps.forEach(stepData => {
        const step = document.createElement('button');
        step.className = 'step';
        step.innerHTML = `<div>${stepData.icon}</div><span>${stepData.label}</span>`;
        step.onclick = () => {
          if (stepData.icon === correct[current]) {
            step.classList.add('done');
            step.disabled = true;
            current++;
            speak(stepData.label);
            if (current === correct.length) {
              feedback.textContent = board.okFinal;
              feedback.classList.add('good');
            } else {
              feedback.textContent = board.okMid;
              feedback.classList.add('good');
            }
          } else {
            feedback.textContent = board.bad;
            feedback.classList.add('bad');
            speak('Orden incorrecto.');
          }
        };
        container.appendChild(step);
      });
    }

    function renderCountGame(board) {
      const row = document.getElementById('countRow');
      const choices = document.getElementById('countChoices');
      const feedback = document.getElementById('countFeedback');
      row.innerHTML = '';
      choices.innerHTML = '';
      feedback.textContent = '';
      feedback.className = 'feedback';

      board.items.forEach(item => {
        const token = document.createElement('div');
        token.className = 'count-token';
        token.textContent = item;
        row.appendChild(token);
      });

      shuffle(board.options).forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'choice choice-text';
        btn.textContent = option;
        btn.onclick = () => {
          if (option === board.answer) {
            feedback.textContent = board.okText;
            feedback.classList.add('good');
            speak('Correcto.');
            disableChildren(choices);
          } else {
            feedback.textContent = board.helpText;
            feedback.classList.add('bad');
            speak('Revisa el conteo.');
          }
        };
        choices.appendChild(btn);
      });
    }

    function renderAll() {
      const level = levels[currentLevel];
      renderLevelButtons();
      renderHeader();
      setTitles(level);

      renderPatternGame({
        rowId: 'pattern1Row',
        choicesId: 'pattern1Choices',
        feedbackId: 'pattern1Feedback',
        ...level.board1
      });

      renderPatternGame({
        rowId: 'pattern2Row',
        choicesId: 'pattern2Choices',
        feedbackId: 'pattern2Feedback',
        ...level.board2
      });

      renderStepsGame(level.board3);
      renderInlinePatternGame(level.board4);
      renderCountGame(level.board5);

      renderPatternGame({
        rowId: 'pattern4Row',
        choicesId: 'pattern4Choices',
        feedbackId: 'pattern4Feedback',
        ...level.board6
      });
    }

    document.getElementById('speakBtn').onclick = () => {
      speak(levels[currentLevel].instructions);
    };

    document.getElementById('resetBtn').onclick = () => {
      renderAll();
      speak('Nivel reiniciado.');
    };

    renderAll();
  </script>
</body>
</html>
