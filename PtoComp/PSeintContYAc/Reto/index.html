<script>
let retoActual = null;
let botonActual = null;
let totalCarrito = 0;
let puntos = 0;
let vidas = 3;
let aciertos = 0;
let correcta = 0;
let resueltos = {basico:new Set(), intermedio:new Set(), avanzado:new Set()};

const retos = {
b1:{nivel:'basico',titulo:'🙋 Contar estudiantes que participaron',imagen:'🙋',correcta:'Contador',reto:'En clase, cada vez que un estudiante participa, el programa debe contar una participación.',acierto:'Correcto. Se cuenta una participación cada vez que ocurre.',explicacion:`Se usa <span class="reservada">contador</span> porque aumenta de 1 en 1.

participaciones <- participaciones + 1`,codigo:`Algoritmo ContarParticipaciones
    Definir i, cantidad, participaciones Como Entero
    participaciones <- 0

    Escribir "¿Cuántos estudiantes participaron?"
    Leer cantidad

    Para i <- 1 Hasta cantidad Hacer
        participaciones <- participaciones + 1
    FinPara

    Escribir "Participaciones: ", participaciones
FinAlgoritmo`},

b2:{nivel:'basico',titulo:'🪙 Sumar monedas recogidas',imagen:'🪙',correcta:'Acumulador',reto:'En un juego, el jugador recoge monedas de diferentes valores. El programa debe sumar el total.',acierto:'Correcto. Se suman valores para guardar un total.',explicacion:`Se usa <span class="reservada">acumulador</span> porque guarda una suma.

total <- total + moneda`,codigo:`Algoritmo SumarMonedas
    Definir i, moneda, total Como Entero
    total <- 0

    Para i <- 1 Hasta 3 Hacer
        Escribir "Ingrese valor de moneda"
        Leer moneda
        total <- total + moneda
    FinPara

    Escribir "Total de monedas: ", total
FinAlgoritmo`},

b3:{nivel:'basico',titulo:'🔐 Contar intentos fallidos',imagen:'🔐',correcta:'Contador',reto:'Un usuario escribe mal la clave. El programa debe contar cuántos intentos fallidos lleva.',acierto:'Correcto. Cada intento fallido aumenta en 1.',explicacion:`Es un contador porque cuenta errores.

intentos <- intentos + 1`,codigo:`Algoritmo IntentosFallidos
    Definir intentos Como Entero
    Definir clave Como Cadena
    intentos <- 0

    Escribir "Ingrese clave"
    Leer clave

    Si clave <> "1234" Entonces
        intentos <- intentos + 1
    FinSi

    Escribir "Intentos fallidos: ", intentos
FinAlgoritmo`},

b4:{nivel:'basico',titulo:'📚 Sumar notas para promedio',imagen:'📚',correcta:'Acumulador',reto:'Un profesor necesita sumar varias notas para después calcular el promedio.',acierto:'Correcto. Las notas se acumulan en una suma.',explicacion:`Se usa acumulador porque cada nota se suma.

suma <- suma + nota`,codigo:`Algoritmo SumarNotas
    Definir i Como Entero
    Definir nota, suma, promedio Como Real
    suma <- 0

    Para i <- 1 Hasta 3 Hacer
        Escribir "Ingrese nota"
        Leer nota
        suma <- suma + nota
    FinPara

    promedio <- suma / 3
    Escribir "Promedio: ", promedio
FinAlgoritmo`},

b5:{nivel:'basico',titulo:'❤️ Restar vidas en un juego',imagen:'❤️',correcta:'Contador',reto:'Un jugador inicia con 3 vidas. Cada vez que falla, pierde una vida.',acierto:'Correcto. Es un contador descendente porque baja de 1 en 1.',explicacion:`Las vidas funcionan como contador descendente.

vidas <- vidas - 1`,codigo:`Algoritmo RestarVidas
    Definir vidas Como Entero
    vidas <- 3

    Escribir "El jugador falló"
    vidas <- vidas - 1

    Escribir "Vidas restantes: ", vidas
FinAlgoritmo`},

i1:{nivel:'intermedio',titulo:'🛒 Tienda con productos vendidos y total',imagen:'🛒',correcta:'Ambos',reto:'Una tienda necesita saber cuántos productos vendió y cuánto dinero recibió en total.',acierto:'Correcto. Cuenta productos y acumula dinero.',explicacion:`Necesita ambos:

contador: productos <- productos + 1
acumulador: total <- total + precio`,codigo:`Algoritmo TiendaProductos
    Definir productos, i Como Entero
    Definir precio, total Como Real
    productos <- 0
    total <- 0

    Para i <- 1 Hasta 3 Hacer
        Escribir "Ingrese precio"
        Leer precio
        productos <- productos + 1
        total <- total + precio
    FinPara

    Escribir "Productos vendidos: ", productos
    Escribir "Total vendido: ", total
FinAlgoritmo`},

i2:{nivel:'intermedio',titulo:'🎮 Juego con puntos y aciertos',imagen:'🎮',correcta:'Ambos',reto:'En un juego, si el jugador responde bien, suma 10 puntos y cuenta un acierto.',acierto:'Correcto. Puntos acumula y aciertos cuenta.',explicacion:`Puntos: acumulador.
Aciertos: contador.

puntos <- puntos + 10
aciertos <- aciertos + 1`,codigo:`Algoritmo JuegoPuntosAciertos
    Definir puntos, aciertos, respuesta Como Entero
    puntos <- 0
    aciertos <- 0

    Escribir "¿Cuánto es 4 + 5?"
    Leer respuesta

    Si respuesta = 9 Entonces
        puntos <- puntos + 10
        aciertos <- aciertos + 1
    FinSi

    Escribir "Puntos: ", puntos
    Escribir "Aciertos: ", aciertos
FinAlgoritmo`},

i3:{nivel:'intermedio',titulo:'⏰ Retardos y minutos acumulados',imagen:'⏰',correcta:'Ambos',reto:'Un colegio necesita contar estudiantes tarde y sumar los minutos de retardo.',acierto:'Correcto. Cuenta estudiantes y acumula minutos.',explicacion:`Contador: estudiantes tarde.
Acumulador: minutos totales.

retardos <- retardos + 1
minutosTotal <- minutosTotal + minutos`,codigo:`Algoritmo Retardos
    Definir i, retardos, minutos Como Entero
    Definir minutosTotal Como Entero
    retardos <- 0
    minutosTotal <- 0

    Para i <- 1 Hasta 3 Hacer
        Escribir "Minutos de retardo"
        Leer minutos
        Si minutos > 0 Entonces
            retardos <- retardos + 1
            minutosTotal <- minutosTotal + minutos
        FinSi
    FinPara

    Escribir "Estudiantes tarde: ", retardos
    Escribir "Minutos acumulados: ", minutosTotal
FinAlgoritmo`},

i4:{nivel:'intermedio',titulo:'📝 Encuesta con respuestas válidas',imagen:'📝',correcta:'Contador',reto:'Una encuesta debe contar cuántas respuestas válidas se registran.',acierto:'Correcto. Se cuentan respuestas válidas.',explicacion:`Se usa contador porque se cuenta cada respuesta válida.

validas <- validas + 1`,codigo:`Algoritmo RespuestasValidas
    Definir i, validas Como Entero
    Definir respuesta Como Cadena
    validas <- 0

    Para i <- 1 Hasta 3 Hacer
        Escribir "Responda si o no"
        Leer respuesta
        Si respuesta = "si" O respuesta = "no" Entonces
            validas <- validas + 1
        FinSi
    FinPara

    Escribir "Respuestas válidas: ", validas
FinAlgoritmo`},

i5:{nivel:'intermedio',titulo:'💵 Caja registradora hasta finalizar',imagen:'💵',correcta:'Acumulador',reto:'Una caja debe sumar precios hasta que el usuario decida finalizar la compra.',acierto:'Correcto. Se acumulan precios.',explicacion:`Se usa acumulador porque se suma el total a pagar.

total <- total + precio`,codigo:`Algoritmo CajaRegistradora
    Definir precio, total Como Real
    Definir continuar Como Cadena
    total <- 0
    continuar <- "si"

    Mientras continuar = "si" Hacer
        Escribir "Ingrese precio"
        Leer precio
        total <- total + precio
        Escribir "¿Desea continuar? si/no"
        Leer continuar
    FinMientras

    Escribir "Total a pagar: ", total
FinAlgoritmo`},

a1:{nivel:'avanzado',titulo:'🎮 Videojuego de sumas y restas',imagen:'🕹️',correcta:'Ambos',reto:'El jugador responde sumas y restas. Si acierta, gana puntos y aciertos; si falla, pierde vidas.',acierto:'Correcto. Usa contador, acumulador y contador descendente.',explicacion:`Puntos: acumulador.
Aciertos: contador.
Vidas: contador descendente.`,codigo:`Algoritmo JuegoSumasRestas
    Definir puntos, vidas, aciertos, respuesta Como Entero
    Definir n1, n2, resultado, operacion Como Entero

    puntos <- 0
    vidas <- 3
    aciertos <- 0

    Mientras vidas > 0 Hacer
        n1 <- Aleatorio(1,9)
        n2 <- Aleatorio(1,9)
        operacion <- Aleatorio(1,2)

        Si operacion = 1 Entonces
            resultado <- n1 + n2
            Escribir "¿Cuánto es ", n1, " + ", n2, "?"
        SiNo
            resultado <- n1 - n2
            Escribir "¿Cuánto es ", n1, " - ", n2, "?"
        FinSi

        Leer respuesta

        Si respuesta = resultado Entonces
            puntos <- puntos + 10
            aciertos <- aciertos + 1
        SiNo
            vidas <- vidas - 1
        FinSi

        Escribir "Puntos: ", puntos
        Escribir "Aciertos: ", aciertos
        Escribir "Vidas: ", vidas
    FinMientras

    Escribir "Juego terminado"
FinAlgoritmo`},

a2:{nivel:'avanzado',titulo:'📦 Inventario con ventas y stock',imagen:'📦',correcta:'Ambos',reto:'Una tienda registra cuántas ventas hizo, cuánto dinero recibió y cuánto stock queda.',acierto:'Correcto. Usa contador, acumulador y resta de stock.',explicacion:`Ventas: contador.
Total vendido: acumulador.
Stock: contador descendente.`,codigo:`Algoritmo InventarioVentas
    Definir stock, ventas, unidades Como Entero
    Definir precio, total Como Real
    stock <- 10
    ventas <- 0
    total <- 0

    Mientras stock > 0 Hacer
        Escribir "Unidades vendidas"
        Leer unidades
        Escribir "Precio"
        Leer precio

        ventas <- ventas + 1
        total <- total + precio
        stock <- stock - unidades
    FinMientras

    Escribir "Ventas: ", ventas
    Escribir "Total vendido: ", total

    Definir i, aprobados Como Entero
    Definir nota, suma, promedio Como Real

    aprobados <- 0

function mostrarReto(id, boton){
    retoActual = retos[id];
    botonActual = boton;
    document.querySelectorAll('.btn-choice').forEach(btn => btn.classList.remove('activo'));
    boton.classList.add('activo');
    document.getElementById('visual').style.display = 'grid';
    document.getElementById('res-titulo').innerHTML = retoActual.titulo;
    document.getElementById('res-reto').innerHTML = retoActual.reto;
    document.getElementById('res-imagen').innerHTML = retoActual.imagen;
    prepararPistas();
    document.getElementById('selector').style.display = 'block';
    document.getElementById('estructuraSelect').value = '';
    document.getElementById('botones').style.display = 'none';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('panel').style.display = 'none';
    document.getElementById('panel').innerHTML = '';
}

function prepararPistas(){
    const pistas = document.getElementById('pistas');
    const ayuda = document.getElementById('pistaAyuda');
    const titulo = document.getElementById('tituloPistas');
    document.querySelectorAll('input[name="pista"]').forEach(chk => {chk.checked=false; chk.disabled=false;});
    ayuda.style.display = 'none';
    ayuda.innerHTML = '';
    if(retoActual.nivel === 'basico'){
        pistas.style.display = 'block';
        titulo.innerHTML = 'Marca la pista que describe el caso';
    }else if(retoActual.nivel === 'intermedio'){
        pistas.style.display = 'block';
        titulo.innerHTML = 'Usa las pistas y luego selecciona la respuesta';
    }else{
        pistas.style.display = 'none';
    }
}

function usarPista(check){
    document.querySelectorAll('input[name="pista"]').forEach(chk => {if(chk !== check) chk.checked = false;});
    const ayuda = document.getElementById('pistaAyuda');
    if(!check.checked){ayuda.style.display='none'; ayuda.innerHTML=''; return;}
    if(retoActual.nivel === 'basico'){
        document.getElementById('estructuraSelect').value = check.value;
        validar();
        ayuda.style.display = 'block';
        ayuda.innerHTML = 'En nivel básico la pista completa la respuesta para observar la relación.';
    }else{
        ayuda.style.display = 'block';
        ayuda.innerHTML = 'La pista te orienta. Ahora selecciona la respuesta en el desplegable.';
    }
}

function validar(){
    const opcion = document.getElementById('estructuraSelect').value;
    const feedback = document.getElementById('feedback');
    if(opcion === ''){feedback.style.display='none'; document.getElementById('botones').style.display='none'; return;}
    feedback.style.display = 'block';
    if(opcion === retoActual.correcta){
        feedback.className = 'feedback ok';
        feedback.innerHTML = '😊 ' + retoActual.acierto;
        document.getElementById('botones').style.display = 'flex';
        marcarResuelto();
    }else{
        feedback.className = 'feedback error';
        feedback.innerHTML = '😟 Revisa: contador cuenta veces, acumulador suma valores y ambos se usan cuando el caso pide las dos cosas.';
        document.getElementById('botones').style.display = 'none';
        document.getElementById('panel').style.display = 'none';
    }
}

function marcarResuelto(){
    const id = botonActual.getAttribute('data-id');
    const nivel = retoActual.nivel;
    resueltos[nivel].add(id);
    botonActual.classList.add('resuelto');
    if(resueltos.basico.size === 5){
        document.getElementById('nivelIntermedio').classList.remove('oculto');
        mostrarAviso('Nivel intermedio disponible.');
    }
    if(resueltos.intermedio.size === 5){
        document.getElementById('nivelAvanzado').classList.remove('oculto');
        mostrarAviso('Nivel avanzado disponible.');
    }
}

function mostrarAviso(texto){
    const aviso = document.getElementById('avisoNivel');
    aviso.innerHTML = texto;
    aviso.style.display = 'block';
    setTimeout(()=>{aviso.style.display='none';},2500);
}

function verExplicacion(){
    const panel = document.getElementById('panel');
    panel.style.display = 'block';
    panel.innerHTML = retoActual.explicacion;
}

function verCodigo(){
    const panel = document.getElementById('panel');
    panel.style.display = 'block';
    panel.innerHTML = retoActual.codigo;
}

function verEjecucion(){
    const panel = document.getElementById('panel');
    panel.style.display = 'block';
    const t = retoActual.titulo;

    if(t.includes('Videojuego de sumas')){reiniciarJuego(); return;}
    if(t.includes('monedas')){
        panel.innerHTML = `Monedas separadas por coma:
<input type="text" id="monedas" placeholder="10,20,50">
<br><button class="btn-panel btn-ejecutar" onclick="ejecutarMonedas()">Ejecutar</button><div id="salida" class="salida"></div>`;
    }else if(t.includes('vidas')){
        panel.innerHTML = `<button class="btn-panel btn-ejecutar" onclick="ejecutarVidas()">Restar vida</button><div id="salida" class="salida">Vidas iniciales: 3</div>`;
    }else if(t.includes('Tienda') || t.includes('Caja')){
        totalCarrito = 0;
        panel.innerHTML = `Precio del producto:
<input type="number" id="precio" placeholder="2500">
<br><button class="btn-panel btn-ejecutar" onclick="agregarProducto()">Agregar</button><div id="salida" class="salida">Total actual: 0</div>`;
    }else{
        panel.innerHTML = `<button class="btn-panel btn-ejecutar" onclick="ejecutarGenerico()">Ejecutar ejemplo</button><div id="salida" class="salida"></div>`;
    }
}

function ejecutarGenerico(){
    const salida = document.getElementById('salida');
    salida.innerHTML = '> Se aplica la lógica del reto: contador suma/resta de 1 en 1 y acumulador guarda el total.';
}
function ejecutarMonedas(){
    const valores = document.getElementById('monedas').value.split(',').map(v=>Number(v.trim())).filter(v=>!isNaN(v));
    let total = 0;
    let texto = '';
    valores.forEach(v=>{total += v; texto += '> Se suma ' + v + '. Total: ' + total + '<br>';});
    document.getElementById('salida').innerHTML = texto || '> Escribe monedas válidas.';
}
let vidasDemo = 3;
function ejecutarVidas(){
    vidasDemo--;
    document.getElementById('salida').innerHTML = vidasDemo >= 0 ? '> vidas <- vidas - 1. Vidas restantes: ' + vidasDemo : '> Sin vidas.';
}
function agregarProducto(){
    const precio = Number(document.getElementById('precio').value);
    if(isNaN(precio) || precio <= 0){document.getElementById('salida').innerHTML='> Ingresa un precio válido.'; return;}
    totalCarrito += precio;
    document.getElementById('salida').innerHTML = '> total <- total + precio. Total actual: ' + totalCarrito;
}

function reiniciarJuego(){
    puntos = 0; vidas = 3; aciertos = 0; nuevaPregunta();
}
function nuevaPregunta(){
    const panel = document.getElementById('panel');
    const a = Math.floor(Math.random()*9)+1;
    const b = Math.floor(Math.random()*9)+1;
    const op = Math.random() > 0.5 ? '+' : '-';
    correcta = op === '+' ? a + b : a - b;
    const opciones = [correcta, correcta + 1, correcta - 1].sort(()=>Math.random()-.5);
    panel.style.display = 'block';
    panel.innerHTML = `<div class="reto-card">
Puntos: ${puntos} | Vidas: ${vidas} | Aciertos: ${aciertos}

¿Cuánto es ${a} ${op} ${b}?

${opciones.map(o=>`<button class="btn-panel btn-ejecucion" onclick="responderJuego(${o})">${o}</button>`).join(' ')}
<div id="salida" class="salida"></div></div>`;
}
function responderJuego(valor){
    const salida = document.getElementById('salida');
    if(valor === correcta){
        puntos += 10;
        aciertos += 1;
        salida.innerHTML = '> Correcto: puntos <- puntos + 10 y aciertos <- aciertos + 1';
    }else{
        vidas -= 1;
        salida.innerHTML = '> Incorrecto: vidas <- vidas - 1';
    }
    if(vidas <= 0){
        setTimeout(()=>{document.getElementById('panel').innerHTML = `<div class="reto-card">Juego terminado.
Puntos finales: ${puntos}
Aciertos: ${aciertos}
<br><button class="btn-panel btn-ejecutar" onclick="reiniciarJuego()">Reiniciar</button></div>`;},900);
    }else{
        setTimeout(nuevaPregunta,900);
    }
}

function mezclarBotones(nivelId){
    const nivel = document.getElementById(nivelId);
    if(!nivel) return;
    const h = nivel.querySelector('h2');
    const botones = Array.from(nivel.querySelectorAll('.btn-choice'));
    for(let i=botones.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [botones[i],botones[j]]=[botones[j],botones[i]];}
    nivel.innerHTML = '';
    nivel.appendChild(h);
    botones.forEach(btn=>nivel.appendChild(btn));
}
mezclarBotones('nivelBasico');
mezclarBotones('nivelIntermedio');
mezclarBotones('nivelAvanzado');
</script>
</body>
</html>
