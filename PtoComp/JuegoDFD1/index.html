
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagramas de flujo por arrastre</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #efefef;
      color: #334155;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px;
    }
    .header {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: #475569;
      margin: 8px 0 14px;
    }
    .footer {
      text-align: center;
      font-size: 20px;
      color: #6b7280;
      margin: 18px 0 8px;
    }

    .topbar {
      background: #4c5b68;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 14px;
    }
    .top-chip {
      background: #f8fafc;
      border: 2px solid #94a3b8;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 18px;
      font-weight: 700;
      color: #475569;
    }

    .panel {
      background: #f8f8f8;
      border: 2px solid #cbd5e1;
      border-radius: 22px;
      padding: 16px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }
    .mode-btn {
      border: 2px solid #94a3b8;
      border-radius: 18px;
      padding: 18px;
      font-size: 28px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      min-height: 100px;
    }
    .btn-blue { background: #42A5F5; }
    .btn-green { background: #66BB6A; }
    .btn-orange { background: #FFA726; }
    .btn-pink { background: #EC407A; }
    .btn-purple { background: #8B5CF6; }

    .problem-list {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .problem-card {
      background: white;
      border: 2px solid #cbd5e1;
      border-radius: 16px;
      padding: 10px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #64748b;
      line-height: 1.25;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      background: white;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }
    .stat .label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 2px;
    }
    .stat .value {
      font-size: 28px;
      font-weight: 700;
      color: #475569;
      line-height: 1.15;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .section-title {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 12px;
    }

    .flow-wrap {
      background: white;
      border: 2px solid #cbd5e1;
      border-radius: 18px;
      padding: 16px;
      min-height: 760px;
      overflow: auto;
    }

    .tray-wrap {
      background: white;
      border: 2px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px;
      min-height: 520px;
    }
    .tray {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .piece {
      background: #ffffff;
      border: 2px solid #94a3b8;
      border-radius: 16px;
      padding: 12px;
      cursor: grab;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select: none;
    }
    .piece:hover { transform: scale(1.01); }
    .piece.selected {
      box-shadow: 0 0 0 5px rgba(66, 165, 245, 0.20);
      border-color: #42A5F5;
    }
    .piece.used {
      opacity: .28;
      pointer-events: none;
    }
    .piece-type {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      color: white;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
    }
    .t-start { background: #42A5F5; }
    .t-process { background: #66BB6A; }
    .t-decision { background: #FFA726; }
    .t-io { background: #EC407A; }
    .piece-text {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.22;
      color: #475569;
    }

    .feedback {
      margin-top: 14px;
      background: white;
      border: 2px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      min-height: 190px;
    }
    .feedback h3 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #475569;
    }
    .feedback p {
      margin: 0;
      font-size: 21px;
      line-height: 1.34;
      color: #6b7280;
    }
    .plus {
      color: #2E7D32;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .minus {
      color: #C62828;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .nav-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .small-btn {
      border: 2px solid #94a3b8;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 20px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    /* flowchart */
    .flowchart {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 660px;
      padding: 10px 0;
    }
    .row {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 26px;
    }
    .row.spread {
      justify-content: space-between;
      padding: 0 36px;
    }
    .v-arrow {
      width: 4px;
      height: 30px;
      background: #64748b;
      position: relative;
    }
    .v-arrow::after {
      content: "";
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid #64748b;
    }
    .h-arrow {
      width: 90px;
      height: 4px;
      background: #64748b;
      position: relative;
      margin-top: 36px;
    }
    .h-arrow.right::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid #64748b;
    }
    .h-arrow.left::after {
      content: "";
      position: absolute;
      left: -1px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 12px solid #64748b;
    }
    .branch {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 210px;
      justify-content: center;
    }
    .branch-label {
      font-size: 18px;
      font-weight: 700;
      color: #64748b;
    }

    .slot {
      width: 220px;
      min-height: 88px;
      border: 2px dashed #94a3b8;
      border-radius: 16px;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      position: relative;
      transition: box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }
    .slot.empty::before {
      content: "Suelta aquí";
      font-size: 18px;
      font-weight: 700;
      color: #94a3b8;
    }
    .slot.current {
      border-color: #f59e0b;
      background: #fff8dc;
      box-shadow: 0 0 0 5px rgba(245, 158, 11, 0.20);
      animation: pulse 1.25s infinite;
    }
    .slot.filled {
      background: white;
      border-style: solid;
    }
    .slot.drop-hover {
      border-color: #42A5F5;
      box-shadow: 0 0 0 5px rgba(66, 165, 245, 0.18);
    }

    .slot-top {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .slot-label {
      background: white;
      border: 2px solid #cbd5e1;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 13px;
      font-weight: 700;
      color: #64748b;
    }
    .hint-btn {
      background: #42A5F5;
      color: white;
      border: 2px solid #94a3b8;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.20); }
      70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0.04); }
      100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    }

    @media (max-width: 980px) {
      .menu-grid, .problem-list, .stats, .main-grid { grid-template-columns: 1fr; }
      .flowchart { min-width: 620px; }
      .header { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const PROBLEMS = [
      {
        title: "Sembrar una semilla",
        difficulty: "1/5",
        layout: "linear",
        order: ["start", "p1", "p2", "p3", "p4", "end"],
        slots: {
          start:  { type: "Inicio / Fin", typeClass: "t-start", text: "Inicio" },
          p1:     { type: "Proceso", typeClass: "t-process", text: "Poner tierra en la maceta" },
          p2:     { type: "Proceso", typeClass: "t-process", text: "Poner la semilla" },
          p3:     { type: "Proceso", typeClass: "t-process", text: "Cubrir con tierra" },
          p4:     { type: "Entrada / Salida", typeClass: "t-io", text: "Echar un poco de agua" },
          end:    { type: "Inicio / Fin", typeClass: "t-start", text: "Fin" }
        },
        hints: {
          start: "Aquí va el paso inicial.",
          p1: "Primero preparas la maceta.",
          p2: "Después colocas lo principal.",
          p3: "Luego tapas la semilla.",
          p4: "Al final haces una acción con agua.",
          end: "Aquí termina el problema."
        }
      },
      {
        title: "Regar una planta",
        difficulty: "2/5",
        layout: "oneDecision",
        order: ["start", "p1", "d1", "no1", "yes1", "end"],
        slots: {
          start:  { type: "Inicio / Fin", typeClass: "t-start", text: "Inicio" },
          p1:     { type: "Proceso", typeClass: "t-process", text: "Tocar la tierra" },
          d1:     { type: "Decisión", typeClass: "t-decision", text: "¿La tierra está seca?" },
          no1:    { type: "Proceso", typeClass: "t-process", text: "Dejar la planta igual" },
          yes1:   { type: "Entrada / Salida", typeClass: "t-io", text: "Echar agua" },
          end:    { type: "Inicio / Fin", typeClass: "t-start", text: "Fin" }
        },
        hints: {
          start: "Aquí empieza el diagrama.",
          p1: "Primero revisas algo de la planta.",
          d1: "Aquí debes verificar cómo está la tierra.",
          no1: "Si NO está seca, no haces mucho más.",
          yes1: "Si SÍ está seca, realizas la acción principal.",
          end: "Aquí termina el problema."
        }
      },
      {
        title: "Preparar un huevo",
        difficulty: "3/5",
        layout: "oneDecision",
        order: ["start", "p1", "d1", "no1", "yes1", "end"],
        slots: {
          start:  { type: "Inicio / Fin", typeClass: "t-start", text: "Inicio" },
          p1:     { type: "Proceso", typeClass: "t-process", text: "Poner el huevo en la sartén" },
          d1:     { type: "Decisión", typeClass: "t-decision", text: "¿Está cocido?" },
          no1:    { type: "Proceso", typeClass: "t-process", text: "Cocinar un poco más" },
          yes1:   { type: "Entrada / Salida", typeClass: "t-io", text: "Servir el huevo" },
          end:    { type: "Inicio / Fin", typeClass: "t-start", text: "Fin" }
        },
        hints: {
          start: "Aquí comienza el problema.",
          p1: "Primero haces una acción para empezar a cocinar.",
          d1: "Después tienes que verificar si ya está listo.",
          no1: "Si NO está listo, necesitas otra acción.",
          yes1: "Si SÍ está listo, ya puedes mostrar el resultado.",
          end: "Aquí termina el diagrama."
        }
      },
      {
        title: "Cruzar la calle",
        difficulty: "4/5",
        layout: "twoDecision",
        order: ["start", "p1", "d1", "p2", "d2", "no1", "yes2", "no2", "end"],
        slots: {
          start:  { type: "Inicio / Fin", typeClass: "t-start", text: "Inicio" },
          p1:     { type: "Proceso", typeClass: "t-process", text: "Mirar el semáforo" },
          d1:     { type: "Decisión", typeClass: "t-decision", text: "¿Está en verde?" },
          p2:     { type: "Proceso", typeClass: "t-process", text: "Mirar a ambos lados" },
          d2:     { type: "Decisión", typeClass: "t-decision", text: "¿Vienen carros?" },
          no1:    { type: "Proceso", typeClass: "t-process", text: "Esperar" },
          yes2:   { type: "Proceso", typeClass: "t-process", text: "Esperar" },
          no2:    { type: "Entrada / Salida", typeClass: "t-io", text: "Cruzar la calle" },
          end:    { type: "Inicio / Fin", typeClass: "t-start", text: "Fin" }
        },
        hints: {
          start: "Aquí va el inicio.",
          p1: "Primero observas algo importante.",
          d1: "Luego verificas el color del semáforo.",
          p2: "Si puedes seguir, haces otra revisión.",
          d2: "Aquí verificas si hay carros.",
          no1: "Si NO está en verde, debes detenerte.",
          yes2: "Si SÍ vienen carros, también debes detenerte.",
          no2: "Si NO vienen carros, ya puedes realizar la acción final.",
          end: "Aquí termina el diagrama."
        }
      },
      {
        title: "Encender una lámpara",
        difficulty: "5/5",
        layout: "threeDecision",
        order: ["start", "p1", "d1", "yes1", "d2", "no2", "d3", "yes3", "no3", "end"],
        slots: {
          start:  { type: "Inicio / Fin", typeClass: "t-start", text: "Inicio" },
          p1:     { type: "Proceso", typeClass: "t-process", text: "Mover el interruptor" },
          d1:     { type: "Decisión", typeClass: "t-decision", text: "¿La lámpara enciende?" },
          yes1:   { type: "Entrada / Salida", typeClass: "t-io", text: "Usar la lámpara" },
          d2:     { type: "Decisión", typeClass: "t-decision", text: "¿Está conectada?" },
          no2:    { type: "Proceso", typeClass: "t-process", text: "Conectar la lámpara" },
          d3:     { type: "Decisión", typeClass: "t-decision", text: "¿El foco está fundido?" },
          yes3:   { type: "Proceso", typeClass: "t-process", text: "Cambiar el foco" },
          no3:    { type: "Entrada / Salida", typeClass: "t-io", text: "Pedir ayuda" },
          end:    { type: "Inicio / Fin", typeClass: "t-start", text: "Fin" }
        },
        hints: {
          start: "Aquí empieza el problema de la lámpara.",
          p1: "Primero intentas encenderla.",
          d1: "Después verificas si funcionó.",
          yes1: "Si SÍ enciende, ya puedes usarla.",
          d2: "Si NO enciende, revisas si está conectada.",
          no2: "Si NO está conectada, debes hacer una acción.",
          d3: "Si sí está conectada, revisas el foco.",
          yes3: "Si el foco está dañado, debes cambiarlo.",
          no3: "Si no es el foco, buscas otra solución.",
          end: "Aquí termina el diagrama."
        }
      }
    ];

    const state = {
      screen: "menu",
      mode: "basic",
      problemIndex: 0,
      score: 0,
      mistakes: 0,
      placed: {},
      selectedPieceId: null,
      draggedPieceId: null,
      message: "Arrastra una pieza o tócala y luego toca un espacio.",
      pointsChange: 0,
      trayOrder: []
    };

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function currentProblem() {
      return PROBLEMS[state.problemIndex];
    }

    function resetProblem() {
      state.placed = {};
      state.selectedPieceId = null;
      state.draggedPieceId = null;
      state.pointsChange = 0;
      state.message = state.mode === "basic"
        ? "Nivel básico: mira la casilla amarilla y usa las pistas."
        : "Nivel avanzado: arma el diagrama sin ayuda.";
      state.trayOrder = shuffle(currentProblem().order.slice());
    }

    function startMode(mode) {
      state.mode = mode;
      state.problemIndex = 0;
      state.score = 0;
      state.mistakes = 0;
      state.screen = "game";
      resetProblem();
      render();
    }

    function nextExpectedSlot() {
      if (state.mode !== "basic") return null;
      const order = currentProblem().order;
      for (const id of order) {
        if (!state.placed[id]) return id;
      }
      return null;
    }

    function addPoints(n) {
      state.score = Math.max(0, state.score + n);
      state.pointsChange = n;
    }

    function showHint(slotId) {
      state.message = currentProblem().hints[slotId];
      state.pointsChange = 0;
      render();
    }

    function selectPiece(pieceId) {
      if (state.placed[pieceId]) return;
      state.selectedPieceId = pieceId;
      state.message = "Ahora toca o suelta esa pieza en el espacio correcto.";
      state.pointsChange = 0;
      render();
    }

    function dragStart(pieceId, ev) {
      if (state.placed[pieceId]) return;
      state.draggedPieceId = pieceId;
      ev.dataTransfer.setData("text/plain", pieceId);
    }

    function dragEnd() {
      state.draggedPieceId = null;
    }

    function allowDrop(ev) {
      ev.preventDefault();
      ev.currentTarget.classList.add("drop-hover");
    }

    function leaveDrop(ev) {
      ev.currentTarget.classList.remove("drop-hover");
    }

    function dropPiece(slotId, ev) {
      ev.preventDefault();
      ev.currentTarget.classList.remove("drop-hover");
      const pieceId = ev.dataTransfer.getData("text/plain") || state.draggedPieceId;
      if (!pieceId) return;
      placePiece(pieceId, slotId);
      state.draggedPieceId = null;
    }

    function clickSlot(slotId) {
      if (!state.selectedPieceId) return;
      placePiece(state.selectedPieceId, slotId);
    }

    function placePiece(pieceId, slotId) {
      if (state.placed[pieceId]) return;

      if (state.mode === "basic" && slotId !== nextExpectedSlot()) {
        state.message = "Todavía no va ese espacio. Mira la casilla amarilla.";
        addPoints(-5);
        state.mistakes += 1;
        state.selectedPieceId = null;
        render();
        return;
      }

      if (pieceId === slotId) {
        state.placed[pieceId] = true;
        state.selectedPieceId = null;
        state.message = "Muy bien. Esa parte está correcta.";
        addPoints(10);

        if (Object.keys(state.placed).length === currentProblem().order.length) {
          state.screen = "problem-done";
        }
        render();
      } else {
        state.message = "Esa pieza no corresponde a ese lugar.";
        addPoints(-5);
        state.mistakes += 1;
        state.selectedPieceId = null;
        render();
      }
    }

    function nextProblem() {
      if (state.problemIndex < PROBLEMS.length - 1) {
        state.problemIndex += 1;
        state.screen = "game";
        resetProblem();
      } else {
        state.screen = "final";
      }
      render();
    }

    function backToMenu() {
      state.screen = "menu";
      render();
    }

    function restartCurrent() {
      resetProblem();
      render();
    }

    function pieceData(id) {
      return { pieceId: id, ...currentProblem().slots[id] };
    }

    function pieceCard(piece, used = false) {
      return `
        <div class="piece ${used ? "used" : ""} ${state.selectedPieceId === piece.pieceId ? "selected" : ""}"
             draggable="${used ? "false" : "true"}"
             ondragstart="dragStart('${piece.pieceId}', event)"
             ondragend="dragEnd()"
             onclick="selectPiece('${piece.pieceId}')">
          <div class="piece-type ${piece.typeClass}">${piece.type}</div>
          <div class="piece-text">${piece.text}</div>
        </div>
      `;
    }

    function slotTop(label, slotId) {
      return `
        <div class="slot-top">
          <div class="slot-label">${label}</div>
          ${state.mode === "basic" ? `<button class="hint-btn" onclick="showHint('${slotId}')">Pista</button>` : ``}
        </div>
      `;
    }

    function slotBox(slotId, label) {
      const filled = !!state.placed[slotId];
      const current = state.mode === "basic" && nextExpectedSlot() === slotId;
      const classes = [
        "slot",
        filled ? "filled" : "empty",
        current ? "current" : ""
      ].join(" ").trim();
      return `
        <div class="${classes}"
             onclick="clickSlot('${slotId}')"
             ondragover="allowDrop(event)"
             ondragleave="leaveDrop(event)"
             ondrop="dropPiece('${slotId}', event)">
          ${slotTop(label, slotId)}
          ${filled ? pieceCard(pieceData(slotId), false) : ``}
        </div>
      `;
    }

    function renderLinear(problem) {
      return `
        <div class="flowchart">
          ${slotBox("start", "Inicio")}
          <div class="v-arrow"></div>
          ${slotBox("p1", "Paso 1")}
          <div class="v-arrow"></div>
          ${slotBox("p2", "Paso 2")}
          <div class="v-arrow"></div>
          ${slotBox("p3", "Paso 3")}
          <div class="v-arrow"></div>
          ${slotBox("p4", "Salida")}
          <div class="v-arrow"></div>
          ${slotBox("end", "Fin")}
        </div>
      `;
    }

    function renderOneDecision(problem) {
      return `
        <div class="flowchart">
          ${slotBox("start", "Inicio")}
          <div class="v-arrow"></div>
          ${slotBox("p1", "Paso")}
          <div class="v-arrow"></div>
          ${slotBox("d1", "Verifica")}
          <div class="row spread">
            <div class="branch">
              <div class="branch-label">No</div>
              <div class="h-arrow left"></div>
              ${slotBox("no1", "Si NO")}
            </div>
            <div class="branch">
              ${slotBox("yes1", "Si SÍ")}
              <div class="h-arrow right"></div>
              <div class="branch-label">Sí</div>
            </div>
          </div>
          <div class="v-arrow"></div>
          ${slotBox("end", "Fin")}
        </div>
      `;
    }

    function renderTwoDecision(problem) {
      return `
        <div class="flowchart">
          ${slotBox("start", "Inicio")}
          <div class="v-arrow"></div>
          ${slotBox("p1", "Paso 1")}
          <div class="v-arrow"></div>
          ${slotBox("d1", "Decisión 1")}
          <div class="row spread">
            <div class="branch">
              <div class="branch-label">No</div>
              <div class="h-arrow left"></div>
              ${slotBox("no1", "Si NO")}
            </div>
            <div class="branch">
              ${slotBox("p2", "Sigue")}
              <div class="h-arrow right"></div>
              <div class="branch-label">Sí</div>
            </div>
          </div>
          <div class="v-arrow"></div>
          ${slotBox("d2", "Decisión 2")}
          <div class="row spread">
            <div class="branch">
              <div class="branch-label">Sí</div>
              <div class="h-arrow left"></div>
              ${slotBox("yes2", "Si SÍ")}
            </div>
            <div class="branch">
              ${slotBox("no2", "Si NO")}
              <div class="h-arrow right"></div>
              <div class="branch-label">No</div>
            </div>
          </div>
          <div class="v-arrow"></div>
          ${slotBox("end", "Fin")}
        </div>
      `;
    }

    function renderThreeDecision(problem) {
      return `
        <div class="flowchart">
          ${slotBox("start", "Inicio")}
          <div class="v-arrow"></div>
          ${slotBox("p1", "Paso")}
          <div class="v-arrow"></div>
          ${slotBox("d1", "Decisión 1")}
          <div class="row spread">
            <div class="branch">
              <div class="branch-label">SÍ</div>
              <div class="h-arrow left"></div>
              ${slotBox("yes1", "Si SÍ")}
            </div>
            <div class="branch">
              ${slotBox("d2", "Decisión 2")}
              <div class="h-arrow right"></div>
              <div class="branch-label">NO</div>
            </div>
          </div>
          <div class="v-arrow"></div>
          <div class="row spread">
            <div class="branch">
              <div class="branch-label">NO</div>
              <div class="h-arrow left"></div>
              ${slotBox("no2", "Si NO")}
            </div>
            <div class="branch">
              ${slotBox("d3", "Decisión 3")}
              <div class="h-arrow right"></div>
              <div class="branch-label">SÍ</div>
            </div>
          </div>
          <div class="v-arrow"></div>
          <div class="row spread">
            <div class="branch">
              <div class="branch-label">SÍ</div>
              <div class="h-arrow left"></div>
              ${slotBox("yes3", "Si SÍ")}
            </div>
            <div class="branch">
              ${slotBox("no3", "Si NO")}
              <div class="h-arrow right"></div>
              <div class="branch-label">NO</div>
            </div>
          </div>
          <div class="v-arrow"></div>
          ${slotBox("end", "Fin")}
        </div>
      `;
    }

    function renderDiagram(problem) {
      if (problem.layout === "linear") return renderLinear(problem);
      if (problem.layout === "oneDecision") return renderOneDecision(problem);
      if (problem.layout === "twoDecision") return renderTwoDecision(problem);
      return renderThreeDecision(problem);
    }

    function renderMenu() {
      return `
        <div class="page">
          <div class="header">Diagramas de Flujo por Arrastre</div>

          <div class="topbar">
            <div class="top-chip">5 problemas progresivos</div>
            <div class="top-chip">Básico con pistas</div>
            <div class="top-chip">Avanzado directo</div>
          </div>

          <div class="panel">
            <div style="text-align:center;">
              <div style="font-size:34px;font-weight:700;color:#475569;margin-bottom:8px;">Elige un modo</div>
              <div style="font-size:20px;color:#6b7280;line-height:1.4;">
                Cada problema sube de dificultad.<br>
                El último es la lámpara con 3 decisiones.
              </div>
            </div>

            <div class="menu-grid">
              <button class="mode-btn btn-blue" onclick="startMode('basic')">
                Nivel básico<br><span style="font-size:19px;font-weight:600;">con casilla guiada y pistas</span>
              </button>
              <button class="mode-btn btn-green" onclick="startMode('advanced')">
                Nivel avanzado<br><span style="font-size:19px;font-weight:600;">sin ayuda</span>
              </button>
            </div>

            <div class="problem-list">
              ${PROBLEMS.map((p, i) => `<div class="problem-card">${i + 1}. ${p.title}<br><span style="font-size:14px;">Dificultad ${p.difficulty}</span></div>`).join("")}
            </div>
          </div>

          <div class="footer">Aprendiendo con ProfeVivy</div>
        </div>
      `;
    }

    function renderGame() {
      const problem = currentProblem();
      return `
        <div class="page">
          <div class="header">Problema ${state.problemIndex + 1}: ${problem.title}</div>

          <div class="topbar">
            <div class="top-chip">Modo: ${state.mode === "basic" ? "Básico" : "Avanzado"}</div>
            <div class="top-chip">Dificultad: ${problem.difficulty}</div>
            <div class="top-chip">Puntos: ${String(state.score).padStart(2, "0")}</div>
            <div class="top-chip">Errores: ${String(state.mistakes).padStart(2, "0")}</div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="label">Problema</div>
              <div class="value" style="font-size:22px;">${problem.title}</div>
            </div>
            <div class="stat">
              <div class="label">Progreso</div>
              <div class="value">${state.problemIndex + 1}/5</div>
            </div>
            <div class="stat">
              <div class="label">Casilla guiada</div>
              <div class="value" style="font-size:22px;">${state.mode === "basic" ? (nextExpectedSlot() || "Completo") : "Sin guía"}</div>
            </div>
            <div class="stat">
              <div class="label">Pieza elegida</div>
              <div class="value" style="font-size:22px;">${state.selectedPieceId ? currentProblem().slots[state.selectedPieceId].type : "Ninguna"}</div>
            </div>
          </div>

          <div class="main-grid">
            <div class="panel">
              <div class="section-title">Diagrama</div>
              <div class="flow-wrap">
                ${renderDiagram(problem)}
              </div>
            </div>

            <div class="panel">
              <div class="section-title">Piezas</div>

              <div class="tray-wrap">
                <div class="tray">
                  ${state.trayOrder.map(id => pieceCard(pieceData(id), !!state.placed[id])).join("")}
                </div>
              </div>

              <div class="feedback">
                <h3>Ayuda textual</h3>
                ${state.pointsChange !== 0 ? `<div class="${state.pointsChange > 0 ? "plus" : "minus"}">${state.pointsChange > 0 ? "+" : ""}${state.pointsChange} puntos</div>` : ``}
                <p>${state.message}</p>

                <div class="nav-row">
                  <button class="small-btn btn-blue" onclick="backToMenu()">Menú</button>
                  <button class="small-btn btn-purple" onclick="restartCurrent()">Reiniciar</button>
                </div>
              </div>
            </div>
          </div>

          <div class="footer">Aprendiendo con ProfeVivy</div>
        </div>
      `;
    }

    function renderProblemDone() {
      const problem = currentProblem();
      return `
        <div class="page">
          <div class="header">Problema completado</div>

          <div class="panel">
            <div style="text-align:center;">
              <div style="font-size:34px;font-weight:700;color:#475569;margin-bottom:8px;">¡Muy bien!</div>
              <div style="font-size:20px;color:#6b7280;">Terminaste: ${problem.title}</div>
            </div>

            <div class="stats" style="margin-top:18px;">
              <div class="stat">
                <div class="label">Problema</div>
                <div class="value">${state.problemIndex + 1}/5</div>
              </div>
              <div class="stat">
                <div class="label">Modo</div>
                <div class="value" style="font-size:22px;">${state.mode === "basic" ? "Básico" : "Avanzado"}</div>
              </div>
              <div class="stat">
                <div class="label">Puntos</div>
                <div class="value">${String(state.score).padStart(2, "0")}</div>
              </div>
              <div class="stat">
                <div class="label">Errores</div>
                <div class="value">${String(state.mistakes).padStart(2, "0")}</div>
              </div>
            </div>

            <div class="nav-row">
              <button class="small-btn btn-green" onclick="nextProblem()">${state.problemIndex < PROBLEMS.length - 1 ? "Siguiente problema" : "Resultado final"}</button>
              <button class="small-btn btn-blue" onclick="backToMenu()">Menú</button>
            </div>
          </div>

          <div class="footer">Aprendiendo con ProfeVivy</div>
        </div>
      `;
    }

    function renderFinal() {
      return `
        <div class="page">
          <div class="header">Resultado final</div>

          <div class="panel">
            <div style="text-align:center;">
              <div style="font-size:34px;font-weight:700;color:#475569;margin-bottom:8px;">Completaste los 5 problemas</div>
              <div style="font-size:20px;color:#6b7280;">Ya terminaste el recorrido progresivo.</div>
            </div>

            <div class="stats" style="margin-top:18px;">
              <div class="stat">
                <div class="label">Modo</div>
                <div class="value" style="font-size:22px;">${state.mode === "basic" ? "Básico" : "Avanzado"}</div>
              </div>
              <div class="stat">
                <div class="label">Problemas</div>
                <div class="value">5/5</div>
              </div>
              <div class="stat">
                <div class="label">Puntos</div>
                <div class="value">${String(state.score).padStart(2, "0")}</div>
              </div>
              <div class="stat">
                <div class="label">Errores</div>
                <div class="value">${String(state.mistakes).padStart(2, "0")}</div>
              </div>
            </div>

            <div class="nav-row">
              <button class="small-btn btn-blue" onclick="backToMenu()">Volver al menú</button>
              <button class="small-btn btn-green" onclick="startMode('${state.mode}')">Jugar otra vez</button>
            </div>
          </div>

          <div class="footer">Aprendiendo con ProfeVivy</div>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      if (state.screen === "menu") app.innerHTML = renderMenu();
      else if (state.screen === "game") app.innerHTML = renderGame();
      else if (state.screen === "problem-done") app.innerHTML = renderProblemDone();
      else app.innerHTML = renderFinal();
    }

    window.startMode = startMode;
    window.showHint = showHint;
    window.selectPiece = selectPiece;
    window.dragStart = dragStart;
    window.dragEnd = dragEnd;
    window.allowDrop = allowDrop;
    window.leaveDrop = leaveDrop;
    window.dropPiece = dropPiece;
    window.clickSlot = clickSlot;
    window.nextProblem = nextProblem;
    window.backToMenu = backToMenu;
    window.restartCurrent = restartCurrent;

    render();
  </script>
</body>
</html>
